//=========================================================================
// D-PAD — nudge selected player by 1 yard per tap
//=========================================================================
function nudgeSelected(dx, dy) {
  if (selectedId === null) return;
  const p = players.find(pl => pl.id === selectedId);
  if (!p) return;
  const margin = 1.8;
  const oldX = p.x, oldY = p.y;
  p.x = Math.max(margin, Math.min(FIELD_W - margin, p.x + dx));
  p.y = Math.max(margin, Math.min(FIELD_H - margin, p.y + dy));
  const dxFinal = p.x - oldX, dyFinal = p.y - oldY;
  updateTokenPosition(p.id);

  // If player is the LOS handle, nudging horizontally moves the LOS + everyone
  if (p.isLosHandle && dxFinal !== 0) {
    const newYards = Math.max(0, Math.min(70, Math.round(losYards + dxFinal / YARD)));
    const realDx = (newYards - losYards) * YARD;
    losYards = newYards;
    // Move all OTHER players + routes by realDx to keep formation
    players.forEach(other => {
      if (other.id === p.id) return;
      other.x = Math.max(margin, Math.min(FIELD_W - margin, other.x + realDx));
      updateTokenPosition(other.id);
    });
    routes.forEach(r => {
      r.points = r.points.map(pt => ({ x: pt.x + realDx, y: pt.y }));
    });
    if (routes.length) renderRoutes();
    updateLos();
    return;
  }

  // Move this player's route(s) too
  if (dxFinal !== 0 || dyFinal !== 0) {
    const ownedRoute = routes.find(r => r.ownerId === p.id);
    if (ownedRoute) {
      ownedRoute.points = ownedRoute.points.map(pt => ({ x: pt.x + dxFinal, y: pt.y + dyFinal }));
      renderRoutes();
    }
  }
}

document.querySelectorAll('#dpad button[data-dir]').forEach(btn => {
  const dir = btn.dataset.dir;
  const step = YARD * 0.5;  // half-yard per tap (and per hold-repeat tick)

  // Map screen direction → svg direction.
  // Field is rotated -90deg: svg +x → screen UP, svg +y → screen RIGHT.
  // When flipped, svg +x → screen DOWN, svg +y → screen LEFT.
  function getDelta() {
    let svgDx = 0, svgDy = 0;
    if (dir === 'up')    svgDx = +step;   // up on screen = forward downfield
    if (dir === 'down')  svgDx = -step;
    if (dir === 'right') svgDy = +step;
    if (dir === 'left')  svgDy = -step;
    if (flipped) { svgDx = -svgDx; svgDy = -svgDy; }
    return { dx: svgDx, dy: svgDy };
  }

  let holdTimer = null;
  let holdInterval = null;

  const fire = () => {
    const { dx, dy } = getDelta();
    nudgeSelected(dx, dy);
  };
  const startHold = (e) => {
    e.preventDefault();
    fire();
    holdTimer = setTimeout(() => {
      holdInterval = setInterval(fire, 80);
    }, 350);
  };
  const stopHold = () => {
    if (holdTimer) { clearTimeout(holdTimer); holdTimer = null; }
    if (holdInterval) { clearInterval(holdInterval); holdInterval = null; }
  };

  btn.addEventListener('touchstart', startHold, { passive: false });
  btn.addEventListener('touchend', stopHold);
  btn.addEventListener('touchcancel', stopHold);
  btn.addEventListener('mousedown', startHold);
  btn.addEventListener('mouseup', stopHold);
  btn.addEventListener('mouseleave', stopHold);
});

//=========================================================================
// PERSISTENT STORAGE — save/load plays and defenses
//=========================================================================
// We use window.storage (key/value persistent storage). Keys:
//   plays:<id>        → JSON of saved play (offense + routes + losYards)
//   defenses:<id>     → JSON of saved defense (just the defenders + relative pos)
//   plays:_index      → JSON array of {id, name, savedAt}
//   defenses:_index   → JSON array of {id, name, savedAt}
//
// Falls back to localStorage if window.storage isn't available.

const HAS_STORAGE = (typeof window.storage !== 'undefined');

async function storageGet(key) {
  if (HAS_STORAGE) {
    try {
      const r = await window.storage.get(key);
      if (r) return r.value;
      // r is null/undefined — could be "key not present" or storage flake.
      // Try localStorage as a fallback in case data was written there.
    } catch { /* fall through */ }
  }
  try { return localStorage.getItem(key); } catch { return null; }
}
async function storageSet(key, value) {
  let primaryOk = false;
  if (HAS_STORAGE) {
    try {
      await window.storage.set(key, value);
      primaryOk = true;
    } catch { /* fall through to localStorage */ }
  }
  // Always also mirror to localStorage so reads work even if window.storage flakes
  try { localStorage.setItem(key, value); return true; } catch (e) {
    if (primaryOk) return true;
    throw new Error('both storages failed: ' + (e && e.message ? e.message : e));
  }
}
async function storageDelete(key) {
  if (HAS_STORAGE) {
    try { await window.storage.delete(key); } catch {}
  }
  try { localStorage.removeItem(key); return true; } catch { return false; }
}

async function getIndex(kind) {
  // kind = 'plays' | 'defenses'
  const raw = await storageGet(`${kind}:_index`);
  if (!raw) return [];
  try { return JSON.parse(raw); } catch { return []; }
}
async function setIndex(kind, list) {
  await storageSet(`${kind}:_index`, JSON.stringify(list));
}

function newId() {
  return Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 6);
}

// ---- Build save payloads ----
function getPlayPayload() {
  // Save offense players + their routes. LOS yardage too (so play loads at the right field position).
  const offense = players.filter(p => p.side === 'offense');
  const offenseIds = new Set(offense.map(p => p.id));
  const offenseRoutes = routes.filter(r => offenseIds.has(r.ownerId));
  // Snapshot the defense too — variants need this since each variant has its
  // own defense alignment.
  const defense = players.filter(p => p.side === 'defense');
  return {
    losYards,
    flipped,
    players: offense.map(p => ({ ...p })),
    routes: offenseRoutes.map(r => ({
      ownerId: r.ownerId,
      points: r.points.map(pt => ({ x: pt.x, y: pt.y })),
      smoothed: r.smoothed,
      branches: (r.branches || []).map(br => ({
        points: br.points.map(pt => ({ x: pt.x, y: pt.y })),
        smoothed: !!br.smoothed,
      })),
    })),
    defense: defense.map(p => ({
      ...p,
      relX: p.x - losXSvg(),  // relative to LOS so it follows it
      relY: p.y,
    })),
    capBoxes: typeof capBoxFills !== 'undefined' ? { ...capBoxFills } : {},
    capBoxesOn,
    // Coverage variants (each is a recursive payload of the same shape,
    // captured at the time of authoring)
    cover2Variant,
    cover3Variant,
    blitzVariant,
  };
}
function getDefensePayload() {
  const defense = players.filter(p => p.side === 'defense');
  const defenseIds = new Set(defense.map(p => p.id));
  const defenseRoutes = routes.filter(r => defenseIds.has(r.ownerId));
  return {
    // Save positions RELATIVE to the LOS so defense aligns to wherever the LOS is when loaded.
    losYards,
    players: defense.map(p => ({
      ...p,
      relX: p.x - losXSvg(),  // signed offset from LOS in svg units
      relY: p.y,
    })),
    routes: defenseRoutes.map(r => ({
      ownerId: r.ownerId,
      points: r.points.map(pt => ({ x: pt.x - losXSvg(), y: pt.y })),  // also relative
      smoothed: r.smoothed,
    })),
  };
}

// ---- Apply payloads ----
function applyPlayPayload(p, opts) {
  // Replace offense AND defense (and their routes) with loaded data.
  players = players.filter(pl => pl.side !== 'offense' && pl.side !== 'defense');
  // Drop any routes whose owner no longer exists.
  routes = routes.filter(r => players.find(pp => pp.id === r.ownerId));

  // Re-add offense players (preserve their original IDs for route mapping)
  const idMap = {};
  p.players.forEach(pl => {
    const newPlayer = {
      id: nextId++,
      side: 'offense',
      x: pl.x, y: pl.y,
      label: pl.label, color: pl.color,
      isLosHandle: !!pl.isLosHandle,
    };
    players.push(newPlayer);
    idMap[pl.id] = newPlayer.id;
  });
  // Re-add offense routes
  p.routes.forEach(r => {
    routes.push({
      id: nextRouteId++,
      ownerId: idMap[r.ownerId],
      points: r.points.map(pt => ({ x: pt.x, y: pt.y })),
      smoothed: r.smoothed,
      branches: (r.branches || []).map(br => ({
        points: br.points.map(pt => ({ x: pt.x, y: pt.y })),
        smoothed: !!br.smoothed,
      })),
    });
  });
  // Restore LOS BEFORE adding defense (so relX/relY anchors correctly).
  losYards = p.losYards;
  // Restore flip state
  if (!!p.flipped !== flipped) {
    flipDirection();
  }
  // Re-add defense (positions stored relative to LOS)
  if (Array.isArray(p.defense)) {
    const losX = losXSvg();
    p.defense.forEach(pl => {
      players.push({
        id: nextId++,
        side: 'defense',
        x: losX + (pl.relX !== undefined ? pl.relX : (pl.x - losX)),
        y: pl.relY !== undefined ? pl.relY : pl.y,
        label: pl.label, color: pl.color,
      });
    });
  }
  // Restore cap boxes
  if (p.capBoxes && typeof capBoxFills !== 'undefined') {
    Object.keys(capBoxFills).forEach(k => delete capBoxFills[k]);
    Object.entries(p.capBoxes).forEach(([k, v]) => { capBoxFills[k] = v; });
  }
  if (typeof capBoxesOn !== 'undefined') {
    capBoxesOn = !!p.capBoxesOn;
    updateCapBoxes && updateCapBoxes();
  }
  // Restore coverage variants (these are payloads themselves)
  cover2Variant = p.cover2Variant || null;
  cover3Variant = p.cover3Variant || null;
  blitzVariant  = p.blitzVariant  || null;
  currentCoverage = 'base';
  // Only re-snapshot the base play when loading a fresh play from storage
  // (not when applying a coverage variant). The caller passes opts.isBaseLoad
  // to indicate the new base.
  if (opts && opts.isBaseLoad) {
    basePlaySnapshot = getPlayPayload();
  }
  updateCoverageButton && updateCoverageButton();
}
function applyDefensePayload(d) {
  // Replace defense (and their routes)
  const oldDefIds = new Set(players.filter(p => p.side === 'defense').map(p => p.id));
  players = players.filter(p => p.side !== 'defense');
  routes = routes.filter(r => !oldDefIds.has(r.ownerId));

  const losX = losXSvg();
  const idMap = {};
  d.players.forEach(pl => {
    const newPlayer = {
      id: nextId++,
      side: 'defense',
      x: losX + pl.relX,
      y: pl.relY,
      label: pl.label, color: pl.color,
      isLosHandle: false,
    };
    players.push(newPlayer);
    idMap[pl.id] = newPlayer.id;
  });
  (d.routes || []).forEach(r => {
    routes.push({
      id: nextRouteId++,
      ownerId: idMap[r.ownerId],
      points: r.points.map(pt => ({ x: losX + pt.x, y: pt.y })),
      smoothed: r.smoothed,
    });
  });
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

async function showSaveDialog(kind, getPayloadFn) {
  // kind: 'plays' or 'defenses'
  const isPlay = kind === 'plays';
  // Pre-fill with current play name (if any) so the user can just hit Save
  // to overwrite. Changing the name and saving creates a new play.
  const prefill = (isPlay && currentPlayName) ? escapeHtmlAttr(currentPlayName) : '';
  openModal(isPlay ? 'Save Play' : 'Save Defense',
    `<label>Name</label>
     <input type="text" id="saveName" placeholder="${isPlay ? 'e.g. Slant Flat Right' : 'e.g. Cover 0 Blitz'}" value="${prefill}" maxlength="40" autocomplete="off" autocorrect="off">
     <p style="margin-top:12px;color:var(--text-dim);font-size:11px;">
       ${isPlay
        ? 'Same name as an existing play OVERWRITES it. New name creates a new play.'
        : 'Saves the current defense (positions relative to LOS).'}
     </p>`,
    {
      confirmText: 'Save',
      onConfirm: async () => {
        const name = document.getElementById('saveName').value.trim();
        if (!name) {
          showHelper("Name is required");
          return;
        }
        const idx = await getIndex(kind);
        const payload = getPayloadFn();
        // Look for an existing entry with the same (case-insensitive) name.
        const existing = idx.find(it => it.name.toLowerCase() === name.toLowerCase());
        if (existing) {
          // Overwrite: keep the same id, update the payload, refresh savedAt.
          const ok = await storageSet(`${kind}:${existing.id}`, JSON.stringify(payload));
          if (!ok) {
            showHelper("Save failed");
            closeModal();
            return;
          }
          existing.savedAt = Date.now();
          existing.name = name;  // refresh casing in case the user retyped it
          await setIndex(kind, idx);
          if (isPlay) currentPlayName = name;
          closeModal();
          showHelper(`Updated "${name}"`);
          return;
        }
        // New entry: fresh id.
        const id = newId();
        const ok = await storageSet(`${kind}:${id}`, JSON.stringify(payload));
        if (!ok) {
          showHelper("Save failed");
          closeModal();
          return;
        }
        idx.unshift({ id, name, savedAt: Date.now() });
        await setIndex(kind, idx);
        if (isPlay) currentPlayName = name;
        closeModal();
        showHelper(`Saved "${name}"`);
      }
    });
}

async function showLoadDialog(kind, applyFn, titleOverride) {
  const isPlay = kind === 'plays';
  const idx = await getIndex(kind);
  let body;
  if (idx.length === 0) {
    body = `<div class="saved-list"><div class="empty">No saved ${isPlay ? 'plays' : 'defenses'} yet.</div></div>`;
  } else {
    const rows = idx.map(item => `
      <li>
        <div class="name" data-load-id="${item.id}">
          ${escapeHtml(item.name)}
          <div class="when">${new Date(item.savedAt).toLocaleString()}</div>
        </div>
        <button class="del" data-del-id="${item.id}" title="Delete">✕</button>
      </li>`).join('');
    body = `<ul class="saved-list">${rows}</ul>`;
  }
  const title = titleOverride || (isPlay ? 'Load Play' : 'Load Defense');
  openModal(title, body, {
    hideConfirm: true,
  });

  // Wire up taps
  modalBody.querySelectorAll('.name').forEach(el => {
    el.addEventListener('click', async (e) => {
      const id = el.dataset.loadId;
      const raw = await storageGet(`${kind}:${id}`);
      if (!raw) { showHelper("Could not load"); return; }
      try {
        const payload = JSON.parse(raw);
        // Plays: mark as a base load so applyPlayPayload re-snapshots.
        if (isPlay) applyFn(payload, { isBaseLoad: true });
        else applyFn(payload);
        render();
        renderRoutes();
        updateLos();
        closeModal();
        const item = idx.find(i => i.id === id);
        if (isPlay && item) {
          currentPlayName = item.name;
          playNameFlipped = false;
          updateCapBoxes && updateCapBoxes();
        }
        showHelper(`Loaded "${item ? item.name : 'item'}"`);
      } catch {
        showHelper("Load failed (corrupt data)");
      }
    });
  });
  modalBody.querySelectorAll('.del').forEach(btn => {
    btn.addEventListener('click', async (e) => {
      e.stopPropagation();
      const id = btn.dataset.delId;
      await storageDelete(`${kind}:${id}`);
      const newIdx = (await getIndex(kind)).filter(i => i.id !== id);
      await setIndex(kind, newIdx);
      // Reopen the list to refresh
      showLoadDialog(kind, applyFn);
    });
  });
}

// Apply a coverage view (game-day workflow)
function applyCoverage(which) {
  if (!basePlaySnapshot) {
    showHelper("Load a play first");
    return;
  }
  if (which === 'base') {
    applyPlayPayload(basePlaySnapshot);
    cover2Variant = basePlaySnapshot.cover2Variant || null;
    cover3Variant = basePlaySnapshot.cover3Variant || null;
    blitzVariant  = basePlaySnapshot.blitzVariant  || null;
    currentCoverage = 'base';
    render(); renderRoutes();
    updateCoverageButton();
    showHelper("Base play");
    return;
  }
  // For coverage variants, apply the variant if it exists; otherwise apply
  // base and overlay the default defense for that coverage.
  const variant = (which === 'cover2') ? cover2Variant
                 : (which === 'cover3') ? cover3Variant
                 : (which === 'blitz')  ? blitzVariant
                 : null;
  if (variant) {
    applyPlayPayload(variant);
    cover2Variant = basePlaySnapshot.cover2Variant || null;
    cover3Variant = basePlaySnapshot.cover3Variant || null;
    blitzVariant  = basePlaySnapshot.blitzVariant  || null;
    currentCoverage = which;
  } else {
    applyPlayPayload(basePlaySnapshot);
    cover2Variant = basePlaySnapshot.cover2Variant || null;
    cover3Variant = basePlaySnapshot.cover3Variant || null;
    blitzVariant  = basePlaySnapshot.blitzVariant  || null;
    if (which === 'cover2')     loadCover2Defense();
    else if (which === 'cover3') loadDefaultDefense();
    else if (which === 'blitz')  loadBlitzDefense();
    currentCoverage = which;
  }
  render(); renderRoutes();
  updateCoverageButton();
  const label = which === 'cover2' ? "Cover 2 view"
              : which === 'cover3' ? "Cover 3 view"
              : "Blitz view";
  showHelper(label);
}

// Cover 2 default defense (mirrors triangle-system)
function loadCover2Defense() {
  players = players.filter(p => p.side !== 'defense');
  routes = routes.filter(r => {
    const owner = players.find(p => p.id === r.ownerId);
    return owner && owner.side !== 'defense';
  });
  const losX = losXSvg();
  addPlayer('defense', losX + 14 * YARD, 26.5 - 10 * YARD, 'S',  '#4a90e2');
  addPlayer('defense', losX + 14 * YARD, 26.5 + 10 * YARD, 'S',  '#4a90e2');
  // LBs at 5y forward of LOS, with lateral nudges:
  //   top LB nudged left 3y    (-3y in svg-y)
  //   middle LB nudged left 1y (-1y)
  //   bottom LB nudged right 3y (+3y)
  addPlayer('defense', losX + 5  * YARD, 26.5 - 10 * YARD - 3 * YARD, 'LB', '#4a90e2');
  addPlayer('defense', losX + 5  * YARD, 26.5             - 1 * YARD, 'LB', '#4a90e2');
  addPlayer('defense', losX + 5  * YARD, 26.5 + 10 * YARD + 3 * YARD, 'LB', '#4a90e2');
}

//---- Tag-coverage flow ----
// Saves the current state (defense + routes + cap boxes) as a coverage
// variant on the loaded play, then persists the play in storage so the
// tag survives across sessions. Prompts before overwriting an existing tag.
async function tagCurrentCoverage() {
  if (!basePlaySnapshot) {
    showHelper("Load a play first");
    return;
  }
  if (currentCoverage === 'base') {
    showHelper("Pick a coverage first (Cover 2 / 3 / Blitz)");
    return;
  }
  const which = currentCoverage;
  const label = which === 'cover2' ? 'Cover 2'
              : which === 'cover3' ? 'Cover 3'
              : 'Blitz';
  // Check if a tag already exists for this coverage on this play
  const existing = (which === 'cover2') ? cover2Variant
                 : (which === 'cover3') ? cover3Variant
                 : blitzVariant;
  if (existing) {
    const ok = await confirmDialog(
      'Replace existing ' + label + ' tag?',
      'This play already has a tagged ' + label + ' adjustment. Replace it with the current view?',
      'Replace');
    if (!ok) return;
  }
  // Build the variant snapshot
  const snapshot = getPlayPayload();
  // Don't recurse: strip nested variant references
  snapshot.cover2Variant = null;
  snapshot.cover3Variant = null;
  snapshot.blitzVariant  = null;
  if (which === 'cover2')      cover2Variant = snapshot;
  else if (which === 'cover3') cover3Variant = snapshot;
  else if (which === 'blitz')  blitzVariant  = snapshot;
  // Persist on the base snapshot so future loads and saves include this tag
  basePlaySnapshot.cover2Variant = cover2Variant;
  basePlaySnapshot.cover3Variant = cover3Variant;
  basePlaySnapshot.blitzVariant  = blitzVariant;
  // Auto-save the play in the background (overwrite if the play is named)
  await autoSaveCurrentPlayWithVariants();
  showHelper(label + " tagged to play");
}

// Saves the loaded play (with variants) back to storage under the same name.
// Used by the tag flow so the user doesn't need a separate Save Play step.
async function autoSaveCurrentPlayWithVariants() {
  if (!currentPlayName) {
    // Play wasn't loaded from saved storage. Just keep the variant in memory.
    return;
  }
  try {
    const idx = await getIndex('plays');
    const existing = idx.find(it => it.name.toLowerCase() === currentPlayName.toLowerCase());
    // Build a payload reflecting the BASE play (not the current coverage view)
    // plus the freshly attached variants.
    const payload = JSON.parse(JSON.stringify(basePlaySnapshot));
    payload.cover2Variant = cover2Variant;
    payload.cover3Variant = cover3Variant;
    payload.blitzVariant  = blitzVariant;
    if (existing) {
      await storageSet('plays:' + existing.id, JSON.stringify(payload));
      existing.savedAt = Date.now();
      await setIndex('plays', idx);
    } else {
      // Play name set but not in index — create a fresh entry
      const id = newId();
      await storageSet('plays:' + id, JSON.stringify(payload));
      idx.unshift({ id, name: currentPlayName, savedAt: Date.now() });
      await setIndex('plays', idx);
    }

// Confirm dialog using the existing modal infrastructure. Returns a promise
// that resolves true (confirm) or false (cancel).
function confirmDialog(title, message, confirmText) {
  return new Promise((resolve) => {
    let resolved = false;
    const settle = (v) => {
      if (resolved) return;
      resolved = true;
      resolve(v);
    };
    // Watch for modal close (cancel button, backdrop click, ESC).
    const onClose = () => {
      modalBackdrop.removeEventListener('transitionend', onClose);
      setTimeout(() => {
        if (!modalBackdrop.classList.contains('open')) settle(false);
      }, 0);
    };
    const origClose = closeModal;
    openModal(title,
      `<p style="margin:0;color:var(--text-dim);font-size:13px;line-height:1.4;">${escapeHtml(message)}</p>`,
      {
        confirmText: confirmText || 'OK',
        onConfirm: () => { closeModal(); settle(true); },
      });
    // Poll briefly for backdrop close to detect cancel/backdrop clicks
    const poll = setInterval(() => {
      if (!modalBackdrop.classList.contains('open')) {
        clearInterval(poll);
        settle(false);
      }
    }, 100);
  });
}

// INIT
//=========================================================================
// ============================================================
// DEMO PLAYS — install hardcoded plays on first load
// ============================================================
async function installDemoPlay(playName, builder) {
  const log = (msg) => { showHelper(msg, 0); };
  try {
    log("A: getting index");
    const idx = await getIndex('plays');
    if (idx.some(p => p.name === playName)) {
      log("Already installed");
      return;
    }

    log("B: snapshotting state");
    const savedPlayers = players.map(p => ({...p}));
    const savedRoutes = routes.map(r => ({...r, points: r.points.map(pt => ({...pt})), branches: (r.branches||[]).map(br => ({...br, points: br.points.map(pt => ({...pt}))}))}));
    const savedLos = losYards;
    const savedFlipped = flipped;
    const savedCapFills = typeof capBoxFills !== 'undefined' ? { ...capBoxFills } : null;
    const savedCapOn = typeof capBoxesOn !== 'undefined' ? capBoxesOn : false;

    try {
      // Helpers exposed to the builder closure
      function rotateSegment(routeOwnerLabel, segIdx, degrees) {
        const owner = players.find(p => p.label === routeOwnerLabel && p.side === 'offense');
        if (!owner) throw new Error('rotateSegment: no owner ' + routeOwnerLabel);
        const r = routes.find(rt => rt.ownerId === owner.id);
        if (!r) throw new Error('rotateSegment: no route for ' + routeOwnerLabel);
        if (segIdx + 1 >= r.points.length) throw new Error('rotateSegment: segIdx oob');
        const pts = [{ x: owner.x, y: owner.y }, ...r.points.slice(1)];
        const pivot = pts[segIdx];
        const rad = degrees * Math.PI / 180;
        const cos = Math.cos(rad), sin = Math.sin(rad);
        for (let i = segIdx + 1; i < pts.length; i++) {
          const dx = pts[i].x - pivot.x;
          const dy = pts[i].y - pivot.y;
          pts[i] = {
            x: pivot.x + dx * cos - dy * sin,
            y: pivot.y + dx * sin + dy * cos,
          };
        }
        r.points = [pts[0], ...pts.slice(1)];
      }
      function lengthenSegment(routeOwnerLabel, segIdx, yards) {
        const owner = players.find(p => p.label === routeOwnerLabel && p.side === 'offense');
        if (!owner) throw new Error('lengthen: no owner ' + routeOwnerLabel);
        const r = routes.find(rt => rt.ownerId === owner.id);
        if (!r) throw new Error('lengthen: no route for ' + routeOwnerLabel);
        if (segIdx + 1 >= r.points.length) throw new Error('lengthen: segIdx oob');
        const pts = [{ x: owner.x, y: owner.y }, ...r.points.slice(1)];
        const segStart = pts[segIdx];
        const segEnd = pts[segIdx + 1];
        const dx = segEnd.x - segStart.x;
        const dy = segEnd.y - segStart.y;
        const len = Math.hypot(dx, dy);
        if (len === 0) return;
        const ux = dx / len, uy = dy / len;
        const offsetX = ux * yards * YARD;
        const offsetY = uy * yards * YARD;
        for (let i = segIdx + 1; i < pts.length; i++) {
          pts[i] = { x: pts[i].x + offsetX, y: pts[i].y + offsetY };
        }
        r.points = [pts[0], ...pts.slice(1)];
      }
      function applyRouteByName(playerLabel, routeName) {
        const owner = players.find(p => p.label === playerLabel && p.side === 'offense');
        if (!owner) throw new Error('applyRoute: no owner ' + playerLabel);
        const route = ROUTE_LIBRARY.find(rt => rt.name === routeName);
        if (!route) throw new Error('applyRoute: route not found: ' + routeName);
        applyRouteToPlayer(owner.id, route);
      }
      function addBranchToPlayer(playerLabel, screenSteps) {
        const owner = players.find(p => p.label === playerLabel && p.side === 'offense');
        if (!owner) throw new Error('addBranch: no owner ' + playerLabel);
        const r = routes.find(rt => rt.ownerId === owner.id);
        if (!r) throw new Error('addBranch: no route for ' + playerLabel);
        const anchor = r.points[r.points.length - 1];
        const branchPoints = [];
        let lastDir = null;
        screenSteps.forEach(s => {
          let svgDx = s.dx * YARD;
          let svgDy = s.dy * YARD;
          if (flipped) { svgDx = -svgDx; svgDy = -svgDy; }
          const newDir = { dx: s.dx, dy: s.dy };
          if (lastDir && lastDir.dx === newDir.dx && lastDir.dy === newDir.dy && branchPoints.length >= 1) {
            const last = branchPoints[branchPoints.length - 1];
            branchPoints[branchPoints.length - 1] = {
              x: last.x + svgDx, y: last.y + svgDy,
            };
          } else {
            const base = branchPoints.length
              ? branchPoints[branchPoints.length - 1]
              : anchor;
            branchPoints.push({ x: base.x + svgDx, y: base.y + svgDy });
          }
          lastDir = newDir;
        });
        if (!r.branches) r.branches = [];
        r.branches.push({ points: branchPoints, smoothed: false });
        return r.branches.length - 1;  // return index of new branch
      }
      // Rotate a single segment within a branch
      function rotateBranchSegment(playerLabel, branchIdx, segIdx, degrees) {
        const owner = players.find(p => p.label === playerLabel && p.side === 'offense');
        if (!owner) throw new Error('rotateBranch: no owner ' + playerLabel);
        const r = routes.find(rt => rt.ownerId === owner.id);
        if (!r || !r.branches || !r.branches[branchIdx]) throw new Error('rotateBranch: no branch');
        const branch = r.branches[branchIdx];
        const anchor = r.points[r.points.length - 1];
        const pts = [anchor, ...branch.points];
        if (segIdx + 1 >= pts.length) throw new Error('rotateBranch: segIdx oob');
        const pivot = pts[segIdx];
        const rad = degrees * Math.PI / 180;
        const cos = Math.cos(rad), sin = Math.sin(rad);
        for (let i = segIdx + 1; i < pts.length; i++) {
          const dx = pts[i].x - pivot.x;
          const dy = pts[i].y - pivot.y;
          pts[i] = {
            x: pivot.x + dx * cos - dy * sin,
            y: pivot.y + dx * sin + dy * cos,
          };
        }
        branch.points = pts.slice(1);
      }
      function setCapBoxes(fillMap) {
        if (typeof capBoxFills === 'undefined') return;
        capBoxesOn = true;
        Object.keys(capBoxFills).forEach(k => delete capBoxFills[k]);
        Object.entries(fillMap).forEach(([k, v]) => { capBoxFills[k] = v; });
        if (typeof updateCapBoxes === 'function') updateCapBoxes();
      }
      function nudgePlayer(playerLabel, screenDx, screenDy) {
        const p = players.find(pl => pl.label === playerLabel && pl.side === 'offense');
        if (!p) throw new Error('nudge: no player ' + playerLabel);
        let dxSvg = screenDx * YARD;
        let dySvg = screenDy * YARD;
        if (flipped) { dxSvg = -dxSvg; dySvg = -dySvg; }
        p.x += dxSvg; p.y += dySvg;
      }
      // Place a player at an absolute position relative to the LOS center.
      // forwardYards = +y downfield; lateralYards = +y toward bottom of screen.
      function placePlayer(playerLabel, forwardYards, lateralYards) {
        const p = players.find(pl => pl.label === playerLabel && pl.side === 'offense');
        if (!p) throw new Error('place: no player ' + playerLabel);
        const dir = flipped ? -1 : 1;
        p.x = losXSvg() + forwardYards * YARD * dir;
        p.y = (FIELD_H / 2) + lateralYards * YARD;
      }
      // Build a route for a player directly from step-builder directions.
      // steps is an array of { dx, dy } in screen-space yards (1 unit each).
      function setRouteSteps(playerLabel, steps) {
        const owner = players.find(p => p.label === playerLabel && p.side === 'offense');
        if (!owner) throw new Error('setRouteSteps: no owner ' + playerLabel);
        // Remove any existing route for this player
        routes = routes.filter(r => r.ownerId !== owner.id);
        const pts = [{ x: owner.x, y: owner.y }];
        let lastDir = null;
        steps.forEach(s => {
          let svgDx = s.dx * YARD;
          let svgDy = s.dy * YARD;
          if (flipped) { svgDx = -svgDx; svgDy = -svgDy; }
          const newDir = { dx: s.dx, dy: s.dy };
          if (lastDir && lastDir.dx === newDir.dx && lastDir.dy === newDir.dy && pts.length >= 2) {
            const last = pts[pts.length - 1];
            pts[pts.length - 1] = { x: last.x + svgDx, y: last.y + svgDy };
          } else {
            const last = pts[pts.length - 1];
            pts.push({ x: last.x + svgDx, y: last.y + svgDy });
          }
          lastDir = newDir;
        });
        routes.push({
          id: nextRouteId++,
          ownerId: owner.id,
          points: pts,
          smoothed: false,
          branches: [],
        });
      }

      // Run the builder with all helpers available
      await builder({
        rotateSegment, lengthenSegment, applyRouteByName, addBranchToPlayer,
        rotateBranchSegment, setCapBoxes, nudgePlayer, placePlayer,
        setRouteSteps, log,
      });

      log("saving payload");
      const payload = getPlayPayload();
      const payloadStr = JSON.stringify(payload);
      const id = newId();
      await storageSet(`plays:${id}`, payloadStr);
      const newIdx = [...idx, { id, name: playName, savedAt: Date.now() }];
      await setIndex('plays', newIdx);
      log("Installed: " + playName);
    } finally {
      players = savedPlayers;
      routes = savedRoutes;
      losYards = savedLos;
      if (flipped !== savedFlipped) flipDirection();
      if (savedCapFills && typeof capBoxFills !== 'undefined') {
        Object.keys(capBoxFills).forEach(k => delete capBoxFills[k]);
        Object.entries(savedCapFills).forEach(([k, v]) => { capBoxFills[k] = v; });
      }
      if (typeof capBoxesOn !== 'undefined') capBoxesOn = savedCapOn;
      if (typeof updateCapBoxes === 'function') updateCapBoxes();
      render();
      renderRoutes();
    }
  } catch (err) {
    showHelper("INSTALL ERROR: " + (err && err.message ? err.message : String(err)), 8000);
  }
}

async function installTwinRightTightSailPlay() {
  await installDemoPlay('Twins R Tight Sail R C-Option', async (H) => {
    const formation = FORMATION_LIBRARY.find(f => f.name === 'Twins Right Tight');
    if (!formation) throw new Error('Twins Right Tight formation not found');
    losYards = 35;
    applyFormation(formation);

    // X: Corner + Longer 2 + Shallower 2 on the break segment (segment 1)
    H.applyRouteByName('X', '7 - Corner');
    H.lengthenSegment('X', 1, 2);
    H.rotateSegment('X', 1, -2 * 7);  // Shallower×2 = -14°

    // Y: Arrow (curve route)
    H.applyRouteByName('Y', '1 - Arrow');

    // Z: Slant + Longer 8 + Shallower 1 on break segment 1
    H.applyRouteByName('Z', '2 - Slant');
    H.lengthenSegment('Z', 1, 8);
    H.rotateSegment('Z', 1, -1 * 7);  // Shallower×1 = -7°

    // C: Go + Shorter 7 + 5 option branches
    H.applyRouteByName('C', '9 - Go');
    H.lengthenSegment('C', 0, -7);  // 5y stem
    // Branch 1: 12 up
    const b1 = [];
    for (let i = 0; i < 12; i++) b1.push({ dx: 1, dy: 0 });
    H.addBranchToPlayer('C', b1);
    // Branch 2: 5 up + 2 down-right (↘)
    const b2 = [];
    for (let i = 0; i < 5; i++) b2.push({ dx: 1, dy: 0 });
    for (let i = 0; i < 2; i++) b2.push({ dx: -1, dy: 1 });
    H.addBranchToPlayer('C', b2);
    // Branch 3: 5 up + 2 down-left (↙)
    const b3 = [];
    for (let i = 0; i < 5; i++) b3.push({ dx: 1, dy: 0 });
    for (let i = 0; i < 2; i++) b3.push({ dx: -1, dy: -1 });
    H.addBranchToPlayer('C', b3);
    // Branch 4: 5 up + 8 left (◀)
    const b4 = [];
    for (let i = 0; i < 5; i++) b4.push({ dx: 1, dy: 0 });
    for (let i = 0; i < 8; i++) b4.push({ dx: 0, dy: -1 });
    H.addBranchToPlayer('C', b4);
    // Branch 5: 5 up + 8 up-left (↖) + Shallower 2 on last segment
    const b5 = [];
    for (let i = 0; i < 5; i++) b5.push({ dx: 1, dy: 0 });
    for (let i = 0; i < 8; i++) b5.push({ dx: 1, dy: -1 });
    const branch5Idx = H.addBranchToPlayer('C', b5);
    // The branch has 2 segments: [anchor → end-of-5-up], [end-of-5-up → end-of-8-up-left]
    // Rotate segment 1 (the up-left one) by Shallower×2 = -14°
    H.rotateBranchSegment('C', branch5Idx, 1, -2 * 7);

    const C = { red: '#ff4444', green: '#7ed957', yellow: '#ffd84d', blue: '#4a90e2' };
    // Top row: blue, blue, green  → col=2
    // Middle row: blue, blue, red → col=1
    // Bottom row: blank, blank, yellow → col=0
    H.setCapBoxes({
      '0,2': C.blue,   '1,2': C.blue, '2,2': C.green,
      '0,1': C.blue,   '1,1': C.blue, '2,1': C.red,
      '2,0': C.yellow,
    });
  });
}

async function installBunchMeshPlay() {
  await installDemoPlay('Bunch R Mesh', async (H) => {
    // Start from a known formation, then hand-place into a Bunch Right + X iso left.
    const base = FORMATION_LIBRARY.find(f => f.name === 'Twins Right');
    if (base) applyFormation(base);
    losYards = 35;
    if (base) applyFormation(base);

    // Convention: lateral +y = bottom of screen = offense's RIGHT.
    // Bunch to the RIGHT (cluster of Z, Y, on the right), X isolated LEFT,
    // C near center on the LOS (late release), QB shotgun.
    H.placePlayer('C',  0,  -1);   // on LOS, just left of center
    H.placePlayer('QB', -6, -1);   // shotgun, 6y behind C
    // Bunch cluster on the right side:
    H.placePlayer('Z',  0,   8);   // point of bunch, on LOS, 8y right
    H.placePlayer('Y',  1,  11);   // apex, 1y off LOS, 11y right
    // X isolated on the far LEFT (backside):
    H.placePlayer('X',  0,  -16);

    // ---- MESH: two shallow crossers passing within ~1y of each other ----
    // X (far left) runs a shallow crosser LEFT→RIGHT at ~4y depth.
    //   3y up stem, then drive across to the right (+y) staying shallow.
    const xMesh = [];
    for (let i = 0; i < 3; i++) xMesh.push({ dx: 1, dy: 0 });    // 3y release upfield
    for (let i = 0; i < 22; i++) xMesh.push({ dx: 0, dy: 1 });   // cross to the right 22y
    for (let i = 0; i < 2; i++) xMesh.push({ dx: 1, dy: 0 });    // climb at the end
    H.setRouteSteps('X', xMesh);

    // Z (bunch right) runs a shallow crosser RIGHT→LEFT at ~5y depth — one yard
    // deeper than X so they mesh cleanly without colliding.
    const zMesh = [];
    for (let i = 0; i < 4; i++) zMesh.push({ dx: 1, dy: 0 });    // 4y release
    for (let i = 0; i < 22; i++) zMesh.push({ dx: 0, dy: -1 });  // cross to the left 22y
    for (let i = 0; i < 2; i++) zMesh.push({ dx: 1, dy: 0 });    // climb at the end
    H.setRouteSteps('Z', zMesh);

    // Y (bunch apex) runs a vertical Go to clear the deep middle/right.
    H.applyRouteByName('Y', '9 - Go');

    // C: late release, sits in the middle at ~6y as the safety valve, with an
    // option branch breaking either way (sit, then break to open grass).
    const cStem = [];
    for (let i = 0; i < 6; i++) cStem.push({ dx: 1, dy: 0 });   // up 6y, sit
    H.setRouteSteps('C', cStem);
    // Option branch 1: continue to the right (toward bunch side void)
    const cRight = [];
    for (let i = 0; i < 6; i++) cRight.push({ dx: 0, dy: 1 });
    H.addBranchToPlayer('C', cRight);
    // Option branch 2: break to the left (away from bunch side)
    const cLeft = [];
    for (let i = 0; i < 6; i++) cLeft.push({ dx: 0, dy: -1 });
    H.addBranchToPlayer('C', cLeft);

    // Cap-box read aid (man-coverage emphasis): highlight the shallow middle
    // where the mesh works. Color the near-LOS middle column.
    const COL = { red: '#ff4444', green: '#7ed957', yellow: '#ffd84d', blue: '#4a90e2' };
    H.setCapBoxes({
      '0,0': COL.green, '1,0': COL.green, '2,0': COL.green,  // shallow band (mesh zone)
    });
  });
}

//=========================================================================
// GAME TRACKER — record called plays in order; tap numbered cap boxes as
// preplay reads; organize by named game; review (list + tap-to-redraw).
//=========================================================================
let trackerActive = false;
let currentGameId = null;
let currentGame = null;     // { id, name, createdAt, plays: [ {id,name,snapshot,prereads:[],calledAt} ] }
let activeEntryId = null;   // entry whose play is shown + whose reads are editable

function gtActiveEntry() {
  if (!currentGame || !activeEntryId) return null;
  return currentGame.plays.find(e => e.id === activeEntryId) || null;
}
function gtActivePrereadSet() {
  const e = gtActiveEntry();
  return new Set(e ? e.prereads : []);
}

// Short tap (not a long-press, no drag) on a cap-box cell.
function attachCapBoxTap(el, onTap) {
  let sp = null, st = 0, moved = false;
  const start = (e) => { const p = (e.touches && e.touches[0]) || e; sp = { x: p.clientX, y: p.clientY }; st = Date.now(); moved = false; };
  const move = (e) => { if (!sp) return; const p = (e.touches && e.touches[0]) || e; if (Math.hypot(p.clientX - sp.x, p.clientY - sp.y) > 8) moved = true; };
  const end = (e) => {
    if (!sp) return;
    const quick = (Date.now() - st) < 500 && !moved;
    sp = null;
    if (quick) { e.preventDefault(); e.stopPropagation(); onTap(e); }
  };
  el.addEventListener('touchstart', start, { passive: false });
  el.addEventListener('touchmove', move, { passive: true });
  el.addEventListener('touchend', end);
  el.addEventListener('mousedown', start);
  el.addEventListener('mousemove', move);
  el.addEventListener('mouseup', end);
}

async function gtTogglePreread(num) {
  if (!trackerActive) return;
  const e = gtActiveEntry();
  if (!e) { showHelper("Record a play first, then tap your reads"); return; }
  const i = e.prereads.indexOf(num);
  if (i >= 0) e.prereads.splice(i, 1); else e.prereads.push(num);
  e.prereads.sort();
  updateCapBoxes();
  gtRenderRibbon();
  await gtSaveGame();
}

// ---- persistence (games:<id>, games:_index, games:_active) ----
async function gtSaveGame() {
  if (!currentGame) return;
  try {
    await storageSet(`games:${currentGame.id}`, JSON.stringify(currentGame));
    const idx = await getIndex('games');
    const meta = { id: currentGame.id, name: currentGame.name, createdAt: currentGame.createdAt, playCount: currentGame.plays.length, savedAt: Date.now() };
    const found = idx.find(g => g.id === currentGame.id);
    if (found) Object.assign(found, meta); else idx.unshift(meta);
    await setIndex('games', idx);
    await storageSet('games:_active', currentGame.id);
  } catch (err) { showHelper("Game save failed"); }
}
async function gtLoadGameById(id) {
  const raw = await storageGet(`games:${id}`);
  if (!raw) return false;
  try { currentGame = JSON.parse(raw); currentGameId = id; activeEntryId = null; return true; }
  catch { return false; }
}
function gtDefaultGameName() {
  return 'Game ' + new Date().toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
}
async function gtEnsureGame() {
  if (currentGame) return;
  const activeId = await storageGet('games:_active');
  if (activeId && await gtLoadGameById(activeId)) return;
  currentGame = { id: newId(), name: gtDefaultGameName(), createdAt: Date.now(), plays: [] };
  currentGameId = currentGame.id;
  activeEntryId = null;
  await gtSaveGame();
}

// ---- sub-ribbon render ----
function gtRenderRibbon() {
  const nameEl = document.getElementById('gtGameName');
  if (nameEl) nameEl.textContent = currentGame ? currentGame.name : 'No game';
  const chips = document.getElementById('gtChips');
  if (!chips) return;
  if (!currentGame || currentGame.plays.length === 0) {
    chips.innerHTML = '<span class="gt-empty">No plays yet — set a play and hit Record.</span>';
    return;
  }
  chips.innerHTML = currentGame.plays.map((e, i) => {
    const reads = (e.prereads && e.prereads.length) ? `<span class="reads">${e.prereads.join(' ')}</span>` : '';
    const active = e.id === activeEntryId ? ' active' : '';
    return `<button class="gt-chip${active}" data-entry="${e.id}"><span class="n">#${i + 1}</span> ${escapeHtml(e.name)} ${reads}</button>`;
  }).join('');
  chips.querySelectorAll('.gt-chip').forEach(c => {
    c.addEventListener('click', () => gtReviewEntry(c.dataset.entry));
  });
  chips.scrollLeft = chips.scrollWidth;
}

// ---- record current play ----
async function gtRecordPlay() {
  await gtEnsureGame();
  if (!currentGame) return;
  const name = (currentPlayName && String(currentPlayName).trim()) || `Play ${currentGame.plays.length + 1}`;
  const entry = { id: newId(), name, snapshot: getPlayPayload(), prereads: [], calledAt: Date.now() };
  currentGame.plays.push(entry);
  activeEntryId = entry.id;
  await gtSaveGame();
  gtRenderRibbon();
  updateCapBoxes();
  showHelper(`Recorded #${currentGame.plays.length}: ${name} — now tap your reads`);
}

// ---- review one entry (redraw it + show its reads) ----
function gtReviewEntry(id) {
  if (!currentGame) return;
  const i = currentGame.plays.findIndex(e => e.id === id);
  if (i < 0) return;
  const e = currentGame.plays[i];
  applyPlayPayload(e.snapshot, { isBaseLoad: true });
  render(); renderRoutes(); updateLos();
  currentPlayName = e.name; playNameFlipped = false;
  activeEntryId = id;
  if (!capBoxesOn) capBoxesOn = true;
  updateCapBoxes();
  gtRenderRibbon();
  showHelper(`#${i + 1}: ${e.name}` + (e.prereads.length ? ` · reads ${e.prereads.join(' ')}` : ''));
}

// ---- name prompt helper ----
function gtPromptText(title, label, value, onOk) {
  openModal(title,
    `<label>${label}</label>
     <input type="text" id="gtTextInput" value="${escapeHtmlAttr(value || '')}" maxlength="40" autocomplete="off" autocorrect="off">`,
    { confirmText: 'OK', onConfirm: () => {
        const v = document.getElementById('gtTextInput').value.trim();
        if (!v) { showHelper("Name is required"); return; }
        closeModal(); onOk(v);
    }});
}

// ---- games menu actions ----
function gtNewGame() {
  gtPromptText('New Game', 'Game name', gtDefaultGameName(), async (name) => {
    currentGame = { id: newId(), name, createdAt: Date.now(), plays: [] };
    currentGameId = currentGame.id; activeEntryId = null;
    await gtSaveGame();
    gtRenderRibbon(); updateCapBoxes();
    showHelper(`Started "${name}"`);
  });
}
function gtRenameGame() {
  if (!currentGame) { showHelper("No active game"); return; }
  gtPromptText('Rename Game', 'Game name', currentGame.name, async (name) => {
    currentGame.name = name;
    await gtSaveGame();
    gtRenderRibbon();
    showHelper(`Renamed to "${name}"`);
  });
}
async function gtSwitchGame() {
  const idx = await getIndex('games');
  if (idx.length === 0) { showHelper("No saved games yet"); return; }
  const rows = idx.map(g => `
    <li>
      <div class="name" data-game-id="${g.id}">
        ${escapeHtml(g.name)}
        <div class="when">${g.playCount || 0} plays · ${new Date(g.createdAt).toLocaleDateString()}</div>
      </div>
      <button class="del" data-del-game="${g.id}" title="Delete">✕</button>
    </li>`).join('');
  openModal('Switch Game', `<ul class="saved-list">${rows}</ul>`, { hideConfirm: true });
  modalBody.querySelectorAll('.name').forEach(el => {
    el.addEventListener('click', async () => {
      const ok = await gtLoadGameById(el.dataset.gameId);
      if (!ok) { showHelper("Could not load game"); return; }
      await storageSet('games:_active', currentGame.id);
      closeModal(); gtRenderRibbon(); updateCapBoxes();
      showHelper(`Loaded "${currentGame.name}"`);
    });
  });
  modalBody.querySelectorAll('.del').forEach(btn => {
    btn.addEventListener('click', async (e) => {
      e.stopPropagation();
      await gtDeleteGameById(btn.dataset.delGame);
      gtSwitchGame();
    });
  });
}
async function gtDeleteGameById(id) {
  await storageDelete(`games:${id}`);
  const idx = (await getIndex('games')).filter(g => g.id !== id);
  await setIndex('games', idx);
  if (currentGame && currentGame.id === id) {
    currentGame = null; currentGameId = null; activeEntryId = null;
    if (idx.length) { await gtLoadGameById(idx[0].id); await storageSet('games:_active', currentGameId); }
    else { await storageDelete('games:_active'); }
    gtRenderRibbon(); updateCapBoxes();
  }
}
async function gtDeleteGame() {
  if (!currentGame) { showHelper("No active game"); return; }
  const ok = await confirmDialog('Delete Game', `Delete "${currentGame.name}" and all its recorded plays? This can't be undone.`, 'Delete');
  if (!ok) return;
  await gtDeleteGameById(currentGame.id);
  showHelper("Game deleted");
}
function gtReviewAll() {
  if (!currentGame || currentGame.plays.length === 0) { showHelper("No plays recorded yet"); return; }
  const rows = currentGame.plays.map((e, i) => `
    <li>
      <div class="name" data-entry="${e.id}">
        #${i + 1} · ${escapeHtml(e.name)}
        <div class="when">${e.prereads.length ? 'reads: ' + e.prereads.join(', ') : 'no reads'} · ${new Date(e.calledAt).toLocaleTimeString()}</div>
      </div>
    </li>`).join('');
  openModal(`${escapeHtml(currentGame.name)} — ${currentGame.plays.length} plays`, `<ul class="saved-list">${rows}</ul>`, { hideConfirm: true });
  modalBody.querySelectorAll('.name').forEach(el => {
    el.addEventListener('click', () => { gtReviewEntry(el.dataset.entry); closeModal(); });
  });
}

// ---- activate / deactivate ----
async function gtSetActive(on) {
  trackerActive = on;
  const ribbon = document.getElementById('trackerRibbon');
  if (ribbon) ribbon.style.display = on ? '' : 'none';
  document.getElementById('trackerBtn').classList.toggle('active', on);
  if (on) {
    await gtEnsureGame();
    if (!capBoxesOn) capBoxesOn = true;   // reads need the numbered grid visible
    gtRenderRibbon();
    showHelper("Game Tracker on · set a play, hit Record, then tap your reads");
  }
  updateCapBoxes();
}

// ---- wiring ----
document.getElementById('trackerBtn').addEventListener('click', () => { gtSetActive(!trackerActive); });
document.getElementById('gtRecordBtn').addEventListener('click', gtRecordPlay);
const gtGamesMenu = document.getElementById('gtGamesMenu');
document.getElementById('gtGamesBtn').addEventListener('click', (e) => { e.stopPropagation(); gtGamesMenu.classList.toggle('open'); });
document.addEventListener('click', (e) => {
  if (!gtGamesMenu.classList.contains('open')) return;
  if (e.target.closest('#gtGamesBtn, #gtGamesMenu')) return;
  gtGamesMenu.classList.remove('open');
});
document.getElementById('gtNewGame').addEventListener('click', () => { gtGamesMenu.classList.remove('open'); gtNewGame(); });
document.getElementById('gtSwitchGame').addEventListener('click', () => { gtGamesMenu.classList.remove('open'); gtSwitchGame(); });
document.getElementById('gtRenameGame').addEventListener('click', () => { gtGamesMenu.classList.remove('open'); gtRenameGame(); });
document.getElementById('gtReviewBtn').addEventListener('click', () => { gtGamesMenu.classList.remove('open'); gtReviewAll(); });
document.getElementById('gtDeleteGame').addEventListener('click', () => { gtGamesMenu.classList.remove('open'); gtDeleteGame(); });

drawYardLines();
drawHashMarks();
buildColorGrid();
loadDefault();
loadFormationLibrary();
// Demo play install is manual via MENU → Install Demo Play
showHelper("Drag players • Drag the C to move LOS", 2800);
// Ensure camera is applied after first paint (viewport measurements may be 0 initially)
requestAnimationFrame(() => applyCamera());
setTimeout(applyCamera, 100);
</script>
