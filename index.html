    if (!g) return;
    g.innerHTML = '';
    if (!currentPlayName) {
      g.style.display = 'none';
      return;
    }
    g.style.display = '';
    const dir = flipped ? -1 : 1;
    const xPos = losXSvg() + dir * (20 * YARD + 2.5);
    const yPos = 26.5;

    const ns = 'http://www.w3.org/2000/svg';
    const t = document.createElementNS(ns, 'text');
    t.setAttribute('x', xPos);
    t.setAttribute('y', yPos);
    t.setAttribute('text-anchor', 'middle');
    t.setAttribute('dominant-baseline', 'middle');
    t.setAttribute('font-size', '2.2');
    t.setAttribute('font-weight', '900');
    t.setAttribute('font-family', 'Arial, sans-serif');
    t.setAttribute('letter-spacing', '0.12em');
    t.setAttribute('fill', '#111');
    t.setAttribute('stroke', '#fff');
    t.setAttribute('stroke-width', '0.6');
    t.setAttribute('paint-order', 'stroke');
    t.setAttribute('transform', 'rotate(' + (flipped ? -90 : 90) + ' ' + xPos + ' ' + yPos + ')');
    // Display the name; if the play has been L/R-mirrored, swap any ISOLATED
    // L↔R (whole-word, standing for Left/Right). Letters inside words are left
    // alone. Word boundaries are spaces, string ends, and hyphens.
    let displayName = String(currentPlayName);
    if (playNameFlipped) {
      displayName = displayName.replace(/(^|[\s\-])([LR])(?=$|[\s\-])/g,
        (m, pre, letter) => pre + (letter === 'L' ? 'R' : 'L'));
    }
    t.textContent = displayName.toUpperCase();
    g.appendChild(t);
  } catch (e) {
    // Silently ignore — label is non-essential
  }
}

function updateCapBoxes() {
  updatePlayNameLabel();
  const g = document.getElementById('capBoxes');
  if (!g) return;
  g.innerHTML = '';
  if (!capBoxesOn) {
    g.style.display = 'none';
    return;
  }
  g.style.display = '';

  // Grid: 3 across (width) × 3 deep (along field). 15y forward of LOS, full width.
  const widthBoxes = 3;
  const depthBoxes = 3;
  const totalDepth_svg = 15 * YARD;
  const totalWidth_svg = FIELD_H;
  const depthStep = totalDepth_svg / depthBoxes;
  const widthStep = totalWidth_svg / widthBoxes;

  // Direction of "forward" depends on flip state.
  // Not flipped: offense moves toward +x; boxes extend from LOS to LOS+20y
  // Flipped: offense moves toward -x; boxes extend from LOS-20y to LOS
  const dir = flipped ? -1 : 1;
  const x0 = losXSvg() + (dir < 0 ? -totalDepth_svg : 0);
  const y0 = 0;

  const ns = 'http://www.w3.org/2000/svg';
  const stroke = '#e64545';
  const strokeWidth = 0.18;

  // 1) Render filled cells FIRST (so the lines on top look crisp).
  //    Cell depth boundaries: 0-5y, 5-10y, 10-15y.
  //    Cell width boundaries are 3 equal lateral columns.
  const colDepthsYards = [0, 5, 10, 15];  // boundaries (4 values → 3 cells)
  for (let row = 0; row < widthBoxes; row++) {
    for (let col = 0; col < depthBoxes; col++) {
      const key = `${row},${col}`;
      const fill = capBoxFills[key];
      const colStart = colDepthsYards[col]     * YARD;
      const colEnd   = colDepthsYards[col + 1] * YARD;
      const cellX    = losXSvg() + dir * (dir > 0 ? colStart : colEnd);
      const cellW    = (colEnd - colStart);
      const rect = document.createElementNS(ns, 'rect');
      rect.setAttribute('x', cellX);
      rect.setAttribute('y', y0 + row * widthStep);
      rect.setAttribute('width', cellW);
      rect.setAttribute('height', widthStep);
      rect.setAttribute('fill', fill || 'transparent');
      rect.setAttribute('fill-opacity', fill ? 0.3 : 0);
      rect.setAttribute('stroke', 'none');
      rect.style.cursor = 'pointer';
      rect.dataset.row = row;
      rect.dataset.col = col;
      // Long-press handler (color picker)
      attachLongPress(rect, (e) => openCapBoxPicker(row, col, e));
      // Game Tracker: short-tap toggles this box as a preread for the active play
      if (typeof trackerActive !== 'undefined' && trackerActive) {
        rect.style.pointerEvents = 'all';
        attachCapBoxTap(rect, () => gtTogglePreread(`${col + 1}-${row + 1}`));
      }
      g.appendChild(rect);

      // Game Tracker: numbered label + preread highlight ring
      if (typeof trackerActive !== 'undefined' && trackerActive) {
        const num = `${col + 1}-${row + 1}`;
        const isPre = gtActivePrereadSet().has(num);
        const cx = cellX + cellW / 2;
        const cy = (y0 + row * widthStep) + widthStep / 2;
        if (isPre) {
          const ring = document.createElementNS(ns, 'rect');
          ring.setAttribute('x', cellX + 0.4);
          ring.setAttribute('y', y0 + row * widthStep + 0.4);
          ring.setAttribute('width', cellW - 0.8);
          ring.setAttribute('height', widthStep - 0.8);
          ring.setAttribute('rx', 0.5);
          ring.setAttribute('fill', 'none');
          ring.setAttribute('stroke', '#00e5ff');
          ring.setAttribute('stroke-width', 0.35);
          ring.style.pointerEvents = 'none';
          g.appendChild(ring);
        }
        const tNum = document.createElementNS(ns, 'text');
        tNum.setAttribute('class', 'capbox-num' + (isPre ? ' on' : ''));
        tNum.setAttribute('x', cx);
        tNum.setAttribute('y', cy);
        const ang = flipped ? -90 : 90;
        tNum.setAttribute('transform', `rotate(${ang} ${cx} ${cy})`);
        tNum.textContent = num;
        g.appendChild(tNum);
      }
    }
  }

  // 2) Depth band lines: exactly TWO lines, at 5y and 10y forward of LOS,
  //    spanning the full field width.
  const depthLineYards = [5, 10];
  depthLineYards.forEach(yds => {
    const x = losXSvg() + dir * yds * YARD;
    const ln = document.createElementNS(ns, 'line');
    ln.setAttribute('x1', x); ln.setAttribute('y1', y0);
    ln.setAttribute('x2', x); ln.setAttribute('y2', y0 + totalWidth_svg);
    ln.setAttribute('stroke', stroke);
    ln.setAttribute('stroke-width', strokeWidth);
    ln.setAttribute('opacity', 0.95);
    ln.style.pointerEvents = 'none';
    g.appendChild(ln);
  });
  // 3) Lateral column dividers — 2 inner lines (3 columns), full 20y depth.
  for (let i = 1; i < widthBoxes; i++) {
    const y = y0 + i * widthStep;
    const ln = document.createElementNS(ns, 'line');
    ln.setAttribute('x1', x0);                  ln.setAttribute('y1', y);
    ln.setAttribute('x2', x0 + totalDepth_svg); ln.setAttribute('y2', y);
    ln.setAttribute('stroke', stroke);
    ln.setAttribute('stroke-width', strokeWidth);
    ln.setAttribute('opacity', 0.95);
    ln.style.pointerEvents = 'none';
    g.appendChild(ln);
  }
}

// Generic long-press helper for an element. Fires `onLongPress(event)` if held >500ms
// without moving > a few px. Cancels on move/leave.
function attachLongPress(el, onLongPress, ms = 500) {
  let timer = null;
  let startPt = null;
  const cancel = () => { if (timer) { clearTimeout(timer); timer = null; } startPt = null; };
  const start = (e) => {
    cancel();
    e.stopPropagation();
    const pt = (e.touches && e.touches[0]) || e;
    startPt = { x: pt.clientX, y: pt.clientY };
    timer = setTimeout(() => {
      timer = null;
      onLongPress(e);
    }, ms);
  };
  const move = (e) => {
    if (!startPt) return;
    const pt = (e.touches && e.touches[0]) || e;
    if (Math.hypot(pt.clientX - startPt.x, pt.clientY - startPt.y) > 8) cancel();
  };
  el.addEventListener('touchstart', start, { passive: false });
  el.addEventListener('touchmove', move, { passive: true });
  el.addEventListener('touchend', cancel);
  el.addEventListener('touchcancel', cancel);
  el.addEventListener('mousedown', start);
  el.addEventListener('mousemove', move);
  el.addEventListener('mouseup', cancel);
  el.addEventListener('mouseleave', cancel);
}

// ---- Cap box color picker ----
function openCapBoxPicker(row, col, e) {
  // Player colors used in defaults: red, yellow, green, blue, plus none/clear
  const COLORS = [
    { name: 'Red',    hex: '#ff4444' },
    { name: 'Yellow', hex: '#ffd84d' },
    { name: 'Green',  hex: '#7ed957' },
    { name: 'Blue',   hex: '#4a90e2' },
    { name: 'Orange', hex: '#ff6b35' },
    { name: 'Purple', hex: '#a78bfa' },
  ];
  const key = `${row},${col}`;
  const current = capBoxFills[key];
  const swatches = COLORS.map(c => `
    <div class="cap-swatch ${current && current.toLowerCase() === c.hex.toLowerCase() ? 'selected' : ''}"
         style="background:${c.hex}" data-color="${c.hex}" title="${c.name}"></div>
  `).join('');
  openModal('Box Color', `
    <p style="color:var(--text-dim);font-size:11px;margin-bottom:12px;">
      Pick a color to fill this box (30% transparent), or clear it.
    </p>
    <div class="cap-swatch-grid">${swatches}</div>
    <button class="cap-clear-btn" id="capClearBtn">Clear Color</button>
  `, { hideConfirm: true });

  // Wire up swatch taps
  modalBody.querySelectorAll('.cap-swatch').forEach(el => {
    el.addEventListener('click', () => {
      capBoxFills[key] = el.dataset.color;
      updateCapBoxes();
      closeModal();
    });
  });
  modalBody.querySelector('#capClearBtn').addEventListener('click', () => {
    delete capBoxFills[key];
    updateCapBoxes();
    closeModal();
  });
}

//=========================================================================
// CAMERA — show a 40y window around the LOS (or whole field if camera off)
//=========================================================================
function updateTextOrientation() {
  // In vertical mode, the wrap is rotated -90°. Counter-rotate yard text so
  // digits read upright. When flipped, the wrap also has a horizontal mirror,
  // so we adjust the rotation direction accordingly.
  document.querySelectorAll('.yard-text').forEach(t => {
    const px = parseFloat(t.dataset.px);
    const py = parseFloat(t.dataset.py);
    // Counter-rotation: in vertical mode, rotate +90° (or -90° if flipped) around (px,py)
    const angle = flipped ? -90 : 90;
    t.setAttribute('transform', `rotate(${angle} ${px} ${py})`);
  });
}

function applyCamera() {
  fieldWrap.style.transform = '';
  fieldWrap.style.width = '';
  fieldWrap.style.height = '';

  const vp = fieldViewport.getBoundingClientRect();
  if (!vp.width || !vp.height) return;

  const STRETCH_X = stretched ? 1.4 : 1.0;

  // VERTICAL ORIENTATION: SVG world is FIELD_W=80 along play axis × FIELD_H=53
  // sideline-to-sideline. We rotate the wrap -90° so the play axis is VERTICAL
  // on screen (offense moves UP from bottom to top). FIELD_H becomes screen-x,
  // FIELD_W becomes screen-y. STRETCH_X stretches along play axis (now vertical).

  // Compute camera window along the play axis (svg x coords)
  let cameraStart_svg, cameraEnd_svg, cameraSpan_svg;
  if (cameraFollowsLos) {
    const cameraW_svg = CAMERA_TOTAL_YARDS * YARD;
    const biasFraction = CAMERA_YARDS_BEHIND_LOS / CAMERA_TOTAL_YARDS;
    // When flipped, the LOS sits at the top instead of bottom of view
    const losBias = flipped ? (1 - biasFraction) : biasFraction;
    let s = losXSvg() - losBias * cameraW_svg;
    const overshoot = CAMERA_YARDS_AHEAD_LOS * YARD;
    s = Math.max(-overshoot, Math.min(FIELD_W - cameraW_svg + overshoot, s));
    cameraStart_svg = s;
    cameraEnd_svg = s + cameraW_svg;
    cameraSpan_svg = cameraW_svg;
  } else {
    cameraStart_svg = 0;
    cameraEnd_svg = FIELD_W;
    cameraSpan_svg = FIELD_W;
  }

  // Fill the viewport WIDTH (sideline-to-sideline) — most important for showing
  // proper spacing along the LOS. The vertical extent (route depth) gets
  // whatever pixels it gets at that scale; camera-follow keeps LOS at the
  // right vertical position with 10y behind and 30y of route ahead visible.
  const scale = vp.width / FIELD_H;

  // The wrap's natural size: 1:1 svg-to-px scale (no STRETCH baked in).
  // STRETCH_X gets applied via a scaleX in the transform chain, which scales
  // the entire wrap content (yard lines, hash marks, end zones, tokens, routes).
  const wrapW = FIELD_W * scale;
  const wrapH = FIELD_H * scale;
  fieldWrap.style.width  = wrapW + 'px';
  fieldWrap.style.height = wrapH + 'px';

  // Camera window screen size (after STRETCH_X applied):
  const camScreenW = FIELD_H * scale;
  const camScreenH = cameraSpan_svg * STRETCH_X * scale;
  const padX = (vp.width - camScreenW) / 2;
  // LOS target on screen:
  //   not flipped: offense moves UP, LOS sits 25% from BOTTOM (vp.height * 0.75)
  //   flipped: offense moves DOWN, LOS sits 25% from TOP (vp.height * 0.25)
  const losBiasFraction = CAMERA_YARDS_BEHIND_LOS / CAMERA_TOTAL_YARDS; // 0.25
  const losTargetScreenY = cameraFollowsLos
    ? (flipped ? vp.height * losBiasFraction : vp.height * (1 - losBiasFraction))
    : vp.height / 2;

  let tx = padX;
  let ty;
  if (cameraFollowsLos) {
    ty = losTargetScreenY + losXSvg() * scale * STRETCH_X;
  } else {
    const fullFieldScreenH = FIELD_W * STRETCH_X * scale;
    const padY = Math.max(0, (vp.height - fullFieldScreenH) / 2);
    ty = vp.height - padY;
  }
  // Transform chain (right-to-left effect):
  //   1. scaleX(STRETCH_X) stretches play-axis (svg x-axis)
  //   2. rotate(-90deg) so play axis points up on screen
  //   3. translate to position
  // Flip is now handled by mirroring player/route positions directly, so no
  // additional transform needed here.
  const transform = `translate(${tx}px, ${ty}px) rotate(-90deg) scaleX(${STRETCH_X})`;

  fieldWrap.style.top  = '0';
  fieldWrap.style.left = '0';
  fieldWrap.style.transform = transform;
  fieldWrap.style.setProperty('--inv-stretch', String(1 / STRETCH_X));
  fieldWrap.style.setProperty('--stretch', String(STRETCH_X));
  fieldWrap.style.setProperty('--token-aspect', String(1 / STRETCH_X));
  fieldWrap.classList.toggle('stretched', stretched);
  fieldWrap.classList.add('vertical');
  updateTextOrientation();
}

window.addEventListener('resize', applyCamera);

//=========================================================================
// DEFAULT FORMATION
//=========================================================================
function loadDefault() {
  players = [];
  routes = [];
  selectedId = null;
  selectedRouteId = null;
  losYards = 35;
  loadDefaultOffense();
  render();
  renderRoutes();
  updateLos();
}

function loadDefaultOffense() {
  // Removes any existing offense, then drops the Twins Right Shotgun
  players = players.filter(p => p.side !== 'offense');
  // Also drop their routes
  routes = routes.filter(r => {
    const owner = players.find(p => p.id === r.ownerId);
    return owner && owner.side !== 'offense';
  });
  const losX = losXSvg();
  // C on LOS, middle of field — LOS handle (blue)
  addPlayer('offense', losX,            26.5, 'C',  '#4a90e2', true);
  // QB 6 yards behind C in shotgun (black)
  addPlayer('offense', losX - 6 * YARD, 26.5, 'QB', '#1a1a1a');
  // Twins to the RIGHT (top of screen): Z red, Y yellow
  addPlayer('offense', losX,            12,   'Z',  '#ff4444');
  addPlayer('offense', losX,            18,   'Y',  '#ffd84d');
  // Backside X on the LEFT (bottom of screen): green
  addPlayer('offense', losX,            41,   'X',  '#7ed957');
}

function loadDefaultDefense() {
  // Cover 3 / 1-high look: 2 CBs inside-shade of WRs, 2 LB seams, 1 high S
  // Removes any existing defense first.
  players = players.filter(p => p.side !== 'defense');
  routes = routes.filter(r => {
    const owner = players.find(p => p.id === r.ownerId);
    return owner && owner.side !== 'defense';
  });
  const losX = losXSvg();
  // CBs nudged up 4y
  addPlayer('defense', losX + 11 * YARD, 12,             'CB', '#4a90e2');
  addPlayer('defense', losX + 11 * YARD, 41,             'CB', '#4a90e2');
  // LBs nudged down 2y, left/right 2y
  addPlayer('defense', losX + 5  * YARD, 19 - 2 * YARD,  'LB', '#4a90e2');
  addPlayer('defense', losX + 5  * YARD, 34 + 2 * YARD,  'LB', '#4a90e2');
  // S nudged up 1y, left 1y
  addPlayer('defense', losX + 11 * YARD, 26.5 - 1 * YARD,'S',  '#4a90e2');
}

function loadBlitzDefense() {
  // Blitz look: Cover 3 alignment but only ONE LB (centered between the two
  // Cover-3 LB positions). 2 CBs + 1 LB + 1 S = 4 defenders.
  players = players.filter(p => p.side !== 'defense');
  routes = routes.filter(r => {
    const owner = players.find(p => p.id === r.ownerId);
    return owner && owner.side !== 'defense';
  });
  const losX = losXSvg();
  // CBs same as Cover 3
  addPlayer('defense', losX + 11 * YARD, 12,             'CB', '#4a90e2');
  addPlayer('defense', losX + 11 * YARD, 41,             'CB', '#4a90e2');
  // Single LB centered (depth same as Cover 3 LBs at 5y forward, lateral = midfield)
  addPlayer('defense', losX + 5  * YARD, 26.5,           'LB', '#4a90e2');
  // S same as Cover 3
  addPlayer('defense', losX + 11 * YARD, 26.5 - 1 * YARD,'S',  '#4a90e2');
}

function addPlayer(side, x, y, label, color, isLosHandle) {
  players.push({ id: nextId++, side, x, y, label, color, isLosHandle: !!isLosHandle });
}

//=========================================================================
// RENDER
//=========================================================================
function render() {
  playerLayer.innerHTML = '';
  // Compute pixel size so tokens render as TRUE circles on screen.
  // The wrap is rotated -90° and scaleX(STRETCH_X). A pre-rotation token of
  // width Wpx, height Hpx becomes screen-x = Hpx, screen-y = Wpx*STRETCH_X.
  // For a circle: Wpx*STRETCH_X = Hpx → Wpx = Hpx/STRETCH_X.
  const STRETCH_X_render = stretched ? 1.4 : 1.0;
  const wrapRect = fieldWrap.getBoundingClientRect();
  // Wrap rect AFTER transforms — its width is the post-transform screen-x extent,
  // which equals FIELD_H × scale (sideline-to-sideline). Use that to derive scale.
  const scale = wrapRect.width / FIELD_H;
  const tokenScreenSize = 46; // ~46 px on screen to fit larger labels
  // pre-rotation height (will become screen-y after stretch and rotate):
  const Hpx = tokenScreenSize / STRETCH_X_render;
  // pre-rotation width (will become screen-x after rotate):
  const Wpx = tokenScreenSize;

  players.forEach(p => {
    const el = document.createElement('div');
    let cls = 'token ' + p.side;
    if (p.id === selectedId) cls += ' selected';
    if (p.isLosHandle) cls += ' los-handle';
    el.className = cls;
    el.dataset.id = p.id;
    el.style.background = p.color;
    el.style.color = colorLum(p.color) > 0.6 ? '#000' : '#fff';
    el.style.left = (p.x / FIELD_W * 100) + '%';
    el.style.top  = (p.y / FIELD_H * 100) + '%';
    el.style.width  = Wpx + 'px';
    el.style.height = Hpx + 'px';
    el.style.aspectRatio = 'auto';
    const labelSpan = document.createElement('span');
    labelSpan.className = 'token-label';
    labelSpan.textContent = p.label || '';
    el.appendChild(labelSpan);
    playerLayer.appendChild(el);
  });
  updateInspector();
  updatePlayerSelect();
}

function updatePlayerSelect() {
  const sel = document.getElementById('playerSelect');
  if (!sel) return;
  // Build options: offense first, then defense
  const off = players.filter(p => p.side === 'offense');
  const def = players.filter(p => p.side === 'defense');
  let html = '<option value="">Select player…</option>';
  if (off.length) {
    html += '<optgroup label="Offense">';
    off.forEach(p => {
      html += `<option value="${p.id}">${escapeHtmlAttr(p.label || '?')}</option>`;
    });
    html += '</optgroup>';
  }
  if (def.length) {
    html += '<optgroup label="Defense">';
    def.forEach(p => {
      html += `<option value="${p.id}">${escapeHtmlAttr(p.label || '?')}</option>`;
    });
    html += '</optgroup>';
  }
  sel.innerHTML = html;
  sel.value = selectedId !== null ? String(selectedId) : '';
}

function escapeHtmlAttr(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

function updateTokenPosition(id) {
  const p = players.find(pl => pl.id === id);
  if (!p) return;
  const el = playerLayer.querySelector(`[data-id="${id}"]`);
  if (!el) return;
  el.style.left = (p.x / FIELD_W * 100) + '%';
  el.style.top  = (p.y / FIELD_H * 100) + '%';
  // Triangles depend on player positions (defenders + outside WRs), so keep
  // them in sync as anything drags.
  if (trianglesOn) renderOutsideWRTriangles();
}

function colorLum(hex) {
  const c = hex.replace('#','');
  const r = parseInt(c.substr(0,2),16)/255;
  const g = parseInt(c.substr(2,2),16)/255;
  const b = parseInt(c.substr(4,2),16)/255;
  return 0.299*r + 0.587*g + 0.114*b;
}

//=========================================================================
// ROUTES — drawing, smoothing/segmenting, rendering
//=========================================================================

// Reduce noisy raw points (Ramer–Douglas–Peucker)
function rdp(points, epsilon) {
  if (points.length < 3) return points.slice();
  const first = points[0], last = points[points.length - 1];
  let maxDist = 0, idx = 0;
  for (let i = 1; i < points.length - 1; i++) {
    const d = perpDist(points[i], first, last);
    if (d > maxDist) { maxDist = d; idx = i; }
  }
  if (maxDist > epsilon) {
    const left = rdp(points.slice(0, idx + 1), epsilon);
    const right = rdp(points.slice(idx), epsilon);
    return left.slice(0, -1).concat(right);
  }
  return [first, last];
}
function perpDist(p, a, b) {
  const dx = b.x - a.x, dy = b.y - a.y;
  if (dx === 0 && dy === 0) return Math.hypot(p.x - a.x, p.y - a.y);
  const t = ((p.x - a.x) * dx + (p.y - a.y) * dy) / (dx*dx + dy*dy);
  const tx = a.x + t * dx, ty = a.y + t * dy;
  return Math.hypot(p.x - tx, p.y - ty);
}

// Walk a simplified path and decide: is this a sharp-cornered route (segments)
// or a smooth curve? A real "sharp" route has 1-2 sharp corners separating
// otherwise straight runs. A curve has many small turns and no big sharp ones.
function classifyPath(simplified) {
  if (simplified.length <= 2) {
    return { type: 'segments', vertices: simplified.slice() };
  }

  // Compute turn angles at each interior point
  const turns = [];
  for (let i = 1; i < simplified.length - 1; i++) {
    const p0 = simplified[i-1], p1 = simplified[i], p2 = simplified[i+1];
    const a1 = Math.atan2(p1.y - p0.y, p1.x - p0.x);
    const a2 = Math.atan2(p2.y - p1.y, p2.x - p1.x);
    let turn = Math.abs(a2 - a1);
    if (turn > Math.PI) turn = 2*Math.PI - turn;
    turns.push(turn);
  }

  // Count "really sharp" corners (>= 60°). These are unambiguous breaks.
  const SHARP = Math.PI / 3;        // 60°
  const sharpCount = turns.filter(t => t >= SHARP).length;

  // If there are 1-2 really sharp corners and the rest are gentle, it's a
  // segmented route. Use only the sharp corners as break points (plus endpoints).
  if (sharpCount >= 1 && sharpCount <= 3) {
    const corners = [0];
    for (let i = 0; i < turns.length; i++) {
      if (turns[i] >= SHARP) corners.push(i + 1);
    }
    corners.push(simplified.length - 1);
    return { type: 'segments', vertices: corners.map(i => simplified[i]) };
  }

  // Otherwise: smooth curve. Keep the simplified path as a curve.
  return { type: 'curve', vertices: simplified.slice() };
}

// Build SVG path 'd' from a classified route. For curves, use Catmull-Rom -> bezier.
function pathDFromRoute(route) {
  const pts = route.points;
  if (pts.length < 2) return '';
  if (route.smoothed === false || pts.length === 2) {
    // Plain segments
    let d = `M ${pts[0].x} ${pts[0].y}`;
    for (let i = 1; i < pts.length; i++) d += ` L ${pts[i].x} ${pts[i].y}`;
    return d;
  }
  // Smooth curve via Catmull-Rom
  return catmullRomPath(pts);
}
function catmullRomPath(pts) {
  if (pts.length < 2) return '';
  let d = `M ${pts[0].x} ${pts[0].y}`;
  for (let i = 0; i < pts.length - 1; i++) {
    const p0 = pts[i-1] || pts[i];
    const p1 = pts[i];
    const p2 = pts[i+1];
    const p3 = pts[i+2] || p2;
    const c1x = p1.x + (p2.x - p0.x) / 6;
    const c1y = p1.y + (p2.y - p0.y) / 6;
    const c2x = p2.x - (p3.x - p1.x) / 6;
    const c2y = p2.y - (p3.y - p1.y) / 6;
    d += ` C ${c1x} ${c1y}, ${c2x} ${c2y}, ${p2.x} ${p2.y}`;
  }
  return d;
}

// Build an arrowhead triangle at the end of the path, oriented along the last segment.
function arrowAtEnd(pts, color) {
  if (pts.length < 2) return '';
  const last = pts[pts.length - 1];
  const prev = pts[pts.length - 2];
  const ang = Math.atan2(last.y - prev.y, last.x - prev.x);
  const size = 1.8;
  // Tip extends beyond the line's endpoint by `size` units along the direction.
  const tipX = last.x + size * Math.cos(ang);
  const tipY = last.y + size * Math.sin(ang);
  // Base wings are perpendicular to the line, sitting at the line's endpoint.
  const halfW = size * 0.55;
  const x2 = last.x + halfW * Math.cos(ang + Math.PI / 2);
  const y2 = last.y + halfW * Math.sin(ang + Math.PI / 2);
  const x3 = last.x + halfW * Math.cos(ang - Math.PI / 2);
  const y3 = last.y + halfW * Math.sin(ang - Math.PI / 2);
  return `M ${tipX} ${tipY} L ${x2} ${y2} L ${x3} ${y3} Z`;
}

// Draw a triangle around each outside WR using their safety + the 2 closest
// non-S defenders. The "outside WRs" are the two offensive players furthest
// from the field's lateral center, regardless of label.
function renderOutsideWRTriangles() {
  const g = document.getElementById('triangles');
  if (!g) return;
  g.innerHTML = '';
  if (!trianglesOn) {
    g.style.display = 'none';
    return;
  }
  g.style.display = '';
  const offense = players.filter(p => p.side === 'offense');
  const defense = players.filter(p => p.side === 'defense');
  if (offense.length < 1 || defense.length < 3) return;
  const cy = FIELD_H / 2;
  // Sort offense by lateral distance from center (farthest first)
  const offByLat = offense.slice().sort((a, b) =>
    Math.abs(b.y - cy) - Math.abs(a.y - cy));
  // The two "outside" WRs: one with smallest y (top) and one with largest y
  // among the outside group. Take the two extreme players.
  const sortedY = offense.slice().sort((a, b) => a.y - b.y);
  const topWR = sortedY[0];
  const botWR = sortedY[sortedY.length - 1];
  // Don't draw if both extremes happen to be the same point
  if (topWR.id === botWR.id) return;

  function drawTriangleFor(wr) {
    // Find nearest S to this WR (by Euclidean distance)
    const safeties = defense.filter(d => d.label === 'S');
    if (safeties.length === 0) return;
    const dist = (a, b) => Math.hypot(a.x - b.x, a.y - b.y);
    safeties.sort((a, b) => dist(a, wr) - dist(b, wr));
    const s = safeties[0];
    // BLITZ rule: if there's exactly one LB on the field, both triangles use
    // that LB plus the WR's nearest CB. Otherwise general rule (2 closest
    // non-S defenders).
    const lbs = defense.filter(d => d.label === 'LB');
    let a, b;
    if (lbs.length === 1) {
      const lb = lbs[0];
      const cbs = defense.filter(d => d.label === 'CB');
      if (cbs.length === 0) return;
      cbs.sort((c1, c2) => dist(c1, wr) - dist(c2, wr));
      a = lb; b = cbs[0];
    } else {
      const others = defense.filter(d => d.id !== s.id);
      others.sort((d1, d2) => dist(d1, wr) - dist(d2, wr));
      if (others.length < 2) return;
      a = others[0]; b = others[1];
    }
    const poly = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
    poly.setAttribute('points',
      s.x + ',' + s.y + ' ' +
      a.x + ',' + a.y + ' ' +
      b.x + ',' + b.y);
    poly.setAttribute('fill', wr.color);
    poly.setAttribute('fill-opacity', '0.30');
    poly.setAttribute('stroke', wr.color);
    poly.setAttribute('stroke-width', '0.25');
    poly.setAttribute('stroke-linejoin', 'round');
    poly.style.pointerEvents = 'none';
    g.appendChild(poly);
  }

  drawTriangleFor(topWR);
  drawTriangleFor(botWR);
}

function renderRoutes() {
  routesGroup.innerHTML = '';
  renderOutsideWRTriangles();
  routes.forEach(r => {
    const owner = players.find(p => p.id === r.ownerId);
    if (!owner) return;
    const pts = [{ x: owner.x, y: owner.y }, ...r.points.slice(1)];
    const color = owner.color;
    const isSelected = r.id === selectedRouteId;

    // For segment-based routes, render each segment as its own clickable path
    if (!r.smoothed) {
      const trimmed = trimPathEnd(pts, 0.3);
      for (let i = 0; i < trimmed.length - 1; i++) {
        const a = trimmed[i];
        const b = trimmed[i + 1];
        const seg = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        let cls = 'route-path';
        if (isSelected) cls += ' selected';
        if (isSelected && selectedSegmentIdx === i) cls += ' segment-selected';
        seg.setAttribute('class', cls);
        seg.setAttribute('d', `M ${a.x} ${a.y} L ${b.x} ${b.y}`);
        seg.setAttribute('stroke', isSelected && selectedSegmentIdx === i ? '#fff' : color);
        seg.dataset.routeId = r.id;
        seg.dataset.segIdx = i;
        seg.addEventListener('click', (e) => onSegmentClick(e, r.id, i));
        seg.addEventListener('touchend', (e) => onSegmentClick(e, r.id, i), { passive: false });
        routesGroup.appendChild(seg);
      }
      // Arrowhead at the END point — skip if route has option branches
      if (!r.branches || r.branches.length === 0) {
        const arrow = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        arrow.setAttribute('class', 'route-arrow');
        arrow.setAttribute('d', arrowAtEnd(pts, color));
        arrow.setAttribute('fill', color);
        arrow.setAttribute('stroke', color);
        arrow.setAttribute('stroke-width', 0.15);
        arrow.setAttribute('stroke-linejoin', 'round');
        routesGroup.appendChild(arrow);
      }
    } else {
      // Smoothed curve: single path
      const trimmed = trimPathEnd(pts, 0.3);
      const d = pathDFromRoute({ ...r, points: trimmed });
      if (!d) return;
      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      path.setAttribute('class', 'route-path' + (isSelected ? ' selected' : ''));
      path.setAttribute('d', d);
      path.setAttribute('stroke', color);
      path.dataset.routeId = r.id;
      path.addEventListener('click', (e) => onRouteClick(e, r.id));
      path.addEventListener('touchend', (e) => onRouteClick(e, r.id), { passive: false });
      routesGroup.appendChild(path);
      if (!r.branches || r.branches.length === 0) {
        const arrow = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        arrow.setAttribute('class', 'route-arrow');
        arrow.setAttribute('d', arrowAtEnd(pts, color));
        arrow.setAttribute('fill', color);
        arrow.setAttribute('stroke', color);
        arrow.setAttribute('stroke-width', 0.15);
        arrow.setAttribute('stroke-linejoin', 'round');
        routesGroup.appendChild(arrow);
      }

      // Waypoint dots when selected — for fine-tuning curve shape
      if (isSelected) {
        for (let i = 1; i < pts.length; i++) {
          const dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
          dot.setAttribute('cx', pts[i].x);
          dot.setAttribute('cy', pts[i].y);
          dot.setAttribute('r', 0.9);
          dot.setAttribute('class', 'route-waypoint' +
            (selectedWaypointIdx === i ? ' wp-selected' : ''));
          dot.setAttribute('fill', selectedWaypointIdx === i ? '#fff' : color);
          dot.setAttribute('stroke', '#000');
          dot.setAttribute('stroke-width', 0.15);
          const hit = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
          hit.setAttribute('cx', pts[i].x);
          hit.setAttribute('cy', pts[i].y);
          hit.setAttribute('r', 2.5);
          hit.setAttribute('fill', 'transparent');
          hit.style.cursor = 'pointer';
          hit.style.pointerEvents = 'all';
          hit.addEventListener('click', (e) => onWaypointClick(e, r.id, i));
          hit.addEventListener('touchend', (e) => onWaypointClick(e, r.id, i), { passive: false });
          routesGroup.appendChild(dot);
          routesGroup.appendChild(hit);
        }
      }
    }

    // Render option-route BRANCHES (dashed lines from route endpoint)
    if (r.branches && r.branches.length > 0) {
      const endPt = pts[pts.length - 1];
      r.branches.forEach((branch, bi) => {
        if (!branch.points || branch.points.length < 1) return;
        const branchPts = [endPt, ...branch.points];
        const trimmed = trimPathEnd(branchPts, 0.3);
        // Each branch segment is tappable for adjustment
        for (let i = 0; i < trimmed.length - 1; i++) {
          const a = trimmed[i];
          const b = trimmed[i + 1];
          const seg = document.createElementNS('http://www.w3.org/2000/svg', 'path');
          let cls = 'route-path route-branch';
          const isThisSelected = isSelected
            && selectedBranchIdx === bi
            && selectedSegmentIdx === i
            && selectedSegmentIsBranch;
          if (isThisSelected) cls += ' segment-selected';
          seg.setAttribute('class', cls);
          seg.setAttribute('d', `M ${a.x} ${a.y} L ${b.x} ${b.y}`);
          seg.setAttribute('stroke', isThisSelected ? '#fff' : color);
          seg.setAttribute('stroke-dasharray', '0.8 1.2');
          seg.addEventListener('click', (e) => onBranchSegmentClick(e, r.id, bi, i));
          seg.addEventListener('touchend', (e) => onBranchSegmentClick(e, r.id, bi, i), { passive: false });
          routesGroup.appendChild(seg);
        }
        const arrow = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        arrow.setAttribute('class', 'route-arrow');
        arrow.setAttribute('d', arrowAtEnd(branchPts, color));
        arrow.setAttribute('fill', color);
        arrow.setAttribute('stroke', color);
        arrow.setAttribute('stroke-width', 0.15);
        arrow.setAttribute('stroke-linejoin', 'round');
        routesGroup.appendChild(arrow);
      });
    }
  });
  updateSegmentAdjustUi();
}

function onSegmentClick(e, routeId, segIdx) {
  e.stopPropagation();
  if (e.cancelable) e.preventDefault();
  if (selectedRouteId === routeId && selectedSegmentIdx === segIdx && !selectedSegmentIsBranch) {
    selectedSegmentIdx = null;
  } else {
    selectedRouteId = routeId;
    selectedSegmentIdx = segIdx;
    selectedWaypointIdx = null;
    selectedBranchIdx = null;
    selectedSegmentIsBranch = false;
  }
  renderRoutes();
}

function onBranchSegmentClick(e, routeId, branchIdx, segIdx) {
  e.stopPropagation();
  if (e.cancelable) e.preventDefault();
  if (selectedRouteId === routeId &&
      selectedBranchIdx === branchIdx &&
      selectedSegmentIdx === segIdx &&
      selectedSegmentIsBranch) {
    selectedSegmentIdx = null;
    selectedBranchIdx = null;
    selectedSegmentIsBranch = false;
  } else {
    selectedRouteId = routeId;
    selectedBranchIdx = branchIdx;
    selectedSegmentIdx = segIdx;
    selectedSegmentIsBranch = true;
    selectedWaypointIdx = null;
  }
  renderRoutes();
}

function onWaypointClick(e, routeId, wpIdx) {
  e.stopPropagation();
  if (e.cancelable) e.preventDefault();
  if (selectedRouteId === routeId && selectedWaypointIdx === wpIdx) {
    selectedWaypointIdx = null;
  } else {
    selectedRouteId = routeId;
    selectedWaypointIdx = wpIdx;
    selectedSegmentIdx = null;
  }
  renderRoutes();
}

function rotateSelectedSegment(degrees) {
  if (selectedRouteId === null || selectedSegmentIdx === null) return;
  const r = routes.find(rt => rt.id === selectedRouteId);
  if (!r) return;
  const owner = players.find(p => p.id === r.ownerId);
  if (!owner) return;

  if (selectedSegmentIsBranch) {
    if (selectedBranchIdx === null || !r.branches || !r.branches[selectedBranchIdx]) return;
    const branch = r.branches[selectedBranchIdx];
    const parentPts = [{ x: owner.x, y: owner.y }, ...r.points.slice(1)];
    const anchor = parentPts[parentPts.length - 1];
    const pts = [anchor, ...branch.points];
    const pivot = pts[selectedSegmentIdx];
    const rad = degrees * Math.PI / 180;
    const cos = Math.cos(rad), sin = Math.sin(rad);
    for (let i = selectedSegmentIdx + 1; i < pts.length; i++) {
      const dx = pts[i].x - pivot.x;
      const dy = pts[i].y - pivot.y;
      pts[i] = {
        x: pivot.x + dx * cos - dy * sin,
        y: pivot.y + dx * sin + dy * cos,
      };
    }
    branch.points = pts.slice(1);
    renderRoutes();
    return;
  }

  const pts = [{ x: owner.x, y: owner.y }, ...r.points.slice(1)];
  const pivot = pts[selectedSegmentIdx];
  const rad = degrees * Math.PI / 180;
  const cos = Math.cos(rad), sin = Math.sin(rad);
  for (let i = selectedSegmentIdx + 1; i < pts.length; i++) {
    const dx = pts[i].x - pivot.x;
    const dy = pts[i].y - pivot.y;
    pts[i] = {
      x: pivot.x + dx * cos - dy * sin,
      y: pivot.y + dx * sin + dy * cos,
    };
  }
  r.points = [pts[0], ...pts.slice(1)];
  renderRoutes();
}

function lengthenSelectedSegment(yards) {
  if (selectedRouteId === null || selectedSegmentIdx === null) return;
  const r = routes.find(rt => rt.id === selectedRouteId);
  if (!r) return;
  const owner = players.find(p => p.id === r.ownerId);
  if (!owner) return;

  if (selectedSegmentIsBranch) {
    if (selectedBranchIdx === null || !r.branches || !r.branches[selectedBranchIdx]) return;
    const branch = r.branches[selectedBranchIdx];
    const parentPts = [{ x: owner.x, y: owner.y }, ...r.points.slice(1)];
    const anchor = parentPts[parentPts.length - 1];
    const pts = [anchor, ...branch.points];
    const segStart = pts[selectedSegmentIdx];
    const segEnd = pts[selectedSegmentIdx + 1];
    if (!segEnd) return;
    const dx = segEnd.x - segStart.x;
    const dy = segEnd.y - segStart.y;
    const len = Math.hypot(dx, dy);
    if (len === 0) return;
    const newLen = len + yards * YARD;
    if (newLen < 0.5 * YARD) return;
    const ux = dx / len, uy = dy / len;
    const offsetX = ux * yards * YARD;
    const offsetY = uy * yards * YARD;
    for (let i = selectedSegmentIdx + 1; i < pts.length; i++) {
      pts[i] = { x: pts[i].x + offsetX, y: pts[i].y + offsetY };
    }
    branch.points = pts.slice(1);
    renderRoutes();
    return;
  }

  const pts = [{ x: owner.x, y: owner.y }, ...r.points.slice(1)];
  const segStart = pts[selectedSegmentIdx];
  const segEnd = pts[selectedSegmentIdx + 1];
  if (!segEnd) return;
  const dx = segEnd.x - segStart.x;
  const dy = segEnd.y - segStart.y;
  const len = Math.hypot(dx, dy);
  if (len === 0) return;
  const newLen = len + yards * YARD;
  if (newLen < 0.5 * YARD) return;
  const ux = dx / len, uy = dy / len;
  const offsetX = ux * yards * YARD;
  const offsetY = uy * yards * YARD;
  for (let i = selectedSegmentIdx + 1; i < pts.length; i++) {
    pts[i] = { x: pts[i].x + offsetX, y: pts[i].y + offsetY };
  }
  r.points = [pts[0], ...pts.slice(1)];
  renderRoutes();
}

// Nudge selected waypoint of a curve by 1 yard in screen direction
function nudgeWaypoint(dx_yards, dy_yards) {
  if (selectedRouteId === null || selectedWaypointIdx === null) return;
  const r = routes.find(rt => rt.id === selectedRouteId);
  if (!r) return;
  if (selectedWaypointIdx < 1 || selectedWaypointIdx >= r.points.length) return;
  let svgDx = dx_yards * YARD;
  let svgDy = dy_yards * YARD;
  if (flipped) { svgDx = -svgDx; svgDy = -svgDy; }
  const wp = r.points[selectedWaypointIdx];
  // Clamp to field
  const m = 1.5;
  r.points[selectedWaypointIdx] = {
    x: Math.max(m, Math.min(FIELD_W - m, wp.x + svgDx)),
    y: Math.max(m, Math.min(FIELD_H - m, wp.y + svgDy)),
  };
  renderRoutes();
}

function updateSegmentAdjustUi() {
  const segPanel = document.getElementById('segAdjust');
  const wpPanel = document.getElementById('wpAdjust');
  if (!segPanel || !wpPanel) return;
  const showSeg = selectedRouteId !== null && selectedSegmentIdx !== null;
  const showWp  = selectedRouteId !== null && selectedWaypointIdx !== null;
  segPanel.classList.toggle('open', showSeg);
  wpPanel.classList.toggle('open', showWp);
}

// Pull the last point back along the final segment by `distance` svg units.
function trimPathEnd(pts, distance) {
  if (pts.length < 2) return pts;
  const last = pts[pts.length - 1];
  const prev = pts[pts.length - 2];
  const dx = last.x - prev.x;
  const dy = last.y - prev.y;
  const len = Math.hypot(dx, dy);
  if (len <= distance) {
    // Last segment too short — just drop the last point and use prev as endpoint
    return pts.slice(0, -1);
  }
  const t = (len - distance) / len;
  const newLast = { x: prev.x + dx * t, y: prev.y + dy * t };
  return [...pts.slice(0, -1), newLast];
}

function onRouteClick(e, routeId) {
  e.stopPropagation();
  if (e.cancelable) e.preventDefault();
  selectedRouteId = routeId;
  // Open inspector for that route's owner so the user can use Delete Route
  const r = routes.find(rt => rt.id === routeId);
  if (r) selectedId = r.ownerId;
  render();
  renderRoutes();
}

// Convert a touch/mouse client point to FIELD-WRAP SVG coordinates (0..80, 0..53),
// accounting for flipped & zoomed transforms.
function clientToFieldXY(clientX, clientY) {
  const rect = fieldWrap.getBoundingClientRect();
  let lx = clientX - rect.left;
  let ly = clientY - rect.top;
  // Wrap is rotated -90°: screen-x in rect maps to svg-y (sideline-to-sideline),
  // screen-y inverted maps to svg-x (offense moves UP = lower screen-y).
  let fy = (lx / rect.width)  * FIELD_H;
  let fx = ((rect.height - ly) / rect.height) * FIELD_W;
  return { x: fx, y: fy };
}

// Live preview (during drawing)
let livePreviewPath = null;
let livePreviewArrow = null;

function startDrawingFrom(playerId, clientX, clientY) {
  const p = players.find(pp => pp.id === playerId);
  if (!p) return;
  // If we're in branch mode (drawMode already set with isBranch), start from
  // the parent route's endpoint instead of the player.
  let startPt = { x: p.x, y: p.y };
  if (drawMode && drawMode.isBranch) {
    const parentRoute = routes.find(r => r.ownerId === playerId);
    if (parentRoute && parentRoute.points.length > 0) {
      const last = parentRoute.points[parentRoute.points.length - 1];
      startPt = { x: last.x, y: last.y };
    }
  }
  drawMode = {
    ownerId: playerId,
    raw: [startPt],
    isBranch: drawMode && drawMode.isBranch || false,
  };
  livePreviewPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  livePreviewPath.setAttribute('class', 'route-path live');
  livePreviewPath.setAttribute('stroke', p.color);
  routesGroup.appendChild(livePreviewPath);
  livePreviewArrow = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  livePreviewArrow.setAttribute('class', 'route-arrow');
  livePreviewArrow.setAttribute('fill', p.color);
  livePreviewArrow.setAttribute('stroke', p.color);
  livePreviewArrow.setAttribute('stroke-width', 0.15);
  routesGroup.appendChild(livePreviewArrow);
}

function extendDrawing(clientX, clientY) {
  if (!drawMode) return;
  const pt = clientToFieldXY(clientX, clientY);
  const last = drawMode.raw[drawMode.raw.length - 1];
  if (Math.hypot(pt.x - last.x, pt.y - last.y) < 0.4) return; // skip jitter

  // While the finger is still over the player's token, keep the first point
  // anchored at the player's center (don't add intermediate points yet).
  // This prevents an ugly kink where the line goes "center → first finger spot → drag direction".
  const owner = players.find(pp => pp.id === drawMode.ownerId);
  if (owner && drawMode.raw.length === 1) {
    const distFromOwner = Math.hypot(pt.x - owner.x, pt.y - owner.y);
    const tokenRadius = FIELD_W * 0.025; // token is 5% wide → ~2.5% radius
    if (distFromOwner < tokenRadius) {
      // Still inside token — don't record yet
      return;
    }
  }

  drawMode.raw.push(pt);
  // update live preview
  let d = `M ${drawMode.raw[0].x} ${drawMode.raw[0].y}`;
  for (let i = 1; i < drawMode.raw.length; i++) {
    d += ` L ${drawMode.raw[i].x} ${drawMode.raw[i].y}`;
  }
  livePreviewPath.setAttribute('d', d);
  livePreviewArrow.setAttribute('d', arrowAtEnd(drawMode.raw));
}

function finishDrawing() {
  if (!drawMode) return;
  const raw = drawMode.raw;
  // Cleanup live preview
  if (livePreviewPath) livePreviewPath.remove();
  if (livePreviewArrow) livePreviewArrow.remove();
  livePreviewPath = null;
  livePreviewArrow = null;

  if (raw.length < 2) {
    cancelDrawing();
    return;
  }
  // Simplify, then classify, then store the simplified vertices
  const simplified = rdp(raw, 0.35);
  const { type, vertices } = classifyPath(simplified);

  const ownerId = drawMode.ownerId;
  const isBranch = !!drawMode.isBranch;

  if (isBranch) {
    // Add as a new branch on the existing route for this player
    const parentRoute = routes.find(r => r.ownerId === ownerId);
    if (parentRoute) {
      if (!parentRoute.branches) parentRoute.branches = [];
      // Skip the first vertex (it's the anchor at the parent's endpoint)
      parentRoute.branches.push({
        points: vertices.slice(1),
        smoothed: type === 'curve',
      });
    }
  } else {
    // Replace any existing route owned by this player
    routes = routes.filter(r => r.ownerId !== ownerId);
    routes.push({
      id: nextRouteId++,
      ownerId,
      points: vertices,
      smoothed: type === 'curve',
      branches: [],
    });
  }

  drawMode = null;
  drawBanner.classList.remove('show');
  renderRoutes();
  updateInspector();
  showHelper(isBranch ? "Option branch added" :
    (type === 'curve' ? "Smooth route saved" : "Route saved (" + (vertices.length - 1) + " segments)"));
}

function cancelDrawing() {
  drawMode = null;
  if (livePreviewPath) livePreviewPath.remove();
  if (livePreviewArrow) livePreviewArrow.remove();
  livePreviewPath = null;
  livePreviewArrow = null;
  drawBanner.classList.remove('show');
  renderRoutes();
}

function enterDrawMode(playerId, isBranch = false) {
  // Replaced by step-builder: use startRouteBuilder or startBranchBuilder
  if (isBranch) {
    const r = routes.find(rt => rt.ownerId === playerId);
    if (!r) {
      showHelper("This player needs a route first");
      return;
    }
    startBranchBuilder(r.id);
  } else {
    startRouteBuilder(playerId);
  }
}

//=========================================================================
// STEP-BUILDER ROUTE DRAWING (1 yard per tap)
//=========================================================================
let routeBuilder = null;  // { playerId, points, branchOfRouteId, lastDir, totalSteps }

function clampX(x) { const m = 1.5; return Math.max(m, Math.min(FIELD_W - m, x)); }
function clampY(y) { const m = 1.5; return Math.max(m, Math.min(FIELD_H - m, y)); }

function hideHelper() {
  const h = document.getElementById('helper');
  if (h) h.classList.remove('show');
}

function startRouteBuilder(playerId) {
  const p = players.find(pl => pl.id === playerId);
  if (!p) return;
  routeBuilder = {
    playerId,
    points: [{ x: p.x, y: p.y }],
    branchOfRouteId: null,
    lastDir: null,
    totalSteps: 0,
  };
  // Replace any existing route for this player
  routes = routes.filter(r => r.ownerId !== playerId);
  // Hide UI
  showInspector = false;
  render();
  document.getElementById('dpad').classList.remove('open');
  document.getElementById('routeDpad').classList.add('open');
  showHelper("Tap arrows to draw 1 yard at a time", 0);
  renderRouteBuilder();
  updateRouteBuilderCount();
}

function startBranchBuilder(routeId) {
  const r = routes.find(rt => rt.id === routeId);
  if (!r) return;
  const owner = players.find(p => p.id === r.ownerId);
  if (!owner) return;
  const anchor = r.points[r.points.length - 1];
  routeBuilder = {
    playerId: r.ownerId,
    points: [{ x: anchor.x, y: anchor.y }],
    branchOfRouteId: routeId,
    lastDir: null,
    totalSteps: 0,
  };
  showInspector = false;
  render();
  document.getElementById('dpad').classList.remove('open');
  document.getElementById('routeDpad').classList.add('open');
  showHelper("Drawing option branch — tap arrows", 0);
  renderRouteBuilder();
  updateRouteBuilderCount();
}

function endRouteBuilder(commit) {
  if (!routeBuilder) return;
  document.getElementById('routeDpad').classList.remove('open');
  hideHelper();
  if (commit && routeBuilder.points.length >= 2) {
    if (routeBuilder.branchOfRouteId !== null) {
      const r = routes.find(rt => rt.id === routeBuilder.branchOfRouteId);
      if (r) {
        if (!r.branches) r.branches = [];
        r.branches.push({
          points: routeBuilder.points.slice(1),
          smoothed: false,
        });
      }
      showHelper("Option branch added");
    } else {
      routes.push({
        id: nextRouteId++,
        ownerId: routeBuilder.playerId,
        points: routeBuilder.points,
        smoothed: false,
        branches: [],
      });
      showHelper("Route saved");
    }
    renderRoutes();
  } else {
    renderRoutes();
  }
  routeBuilder = null;
  updateInspector();
}

function stepRoute(dx_yards, dy_yards) {
  if (!routeBuilder) return;
  let svgDx = dx_yards * YARD;
  let svgDy = dy_yards * YARD;
  if (flipped) { svgDx = -svgDx; svgDy = -svgDy; }

  const last = routeBuilder.points[routeBuilder.points.length - 1];
  const newDir = { dx: dx_yards, dy: dy_yards };
  if (routeBuilder.lastDir &&
      routeBuilder.lastDir.dx === newDir.dx &&
      routeBuilder.lastDir.dy === newDir.dy &&
      routeBuilder.points.length >= 2) {
    // Same direction → extend last waypoint
    routeBuilder.points[routeBuilder.points.length - 1] = {
      x: clampX(last.x + svgDx),
      y: clampY(last.y + svgDy),
    };
  } else {
    // New direction → add waypoint
    routeBuilder.points.push({
      x: clampX(last.x + svgDx),
      y: clampY(last.y + svgDy),
    });
  }
  routeBuilder.lastDir = newDir;
  routeBuilder.totalSteps = (routeBuilder.totalSteps || 0) + 1;
  renderRouteBuilder();
  updateRouteBuilderCount();
}

function undoLastStep() {
  if (!routeBuilder) return;
  if (routeBuilder.points.length <= 1) return;
  if (!routeBuilder.lastDir) {
    routeBuilder.points.pop();
    return;
  }
  let svgDx = routeBuilder.lastDir.dx * YARD;
  let svgDy = routeBuilder.lastDir.dy * YARD;
  if (flipped) { svgDx = -svgDx; svgDy = -svgDy; }
  const last = routeBuilder.points[routeBuilder.points.length - 1];
  const prev = routeBuilder.points[routeBuilder.points.length - 2];
  const segSvgLen = Math.hypot(last.x - prev.x, last.y - prev.y);
  const stepSvgLen = Math.hypot(svgDx, svgDy);
  if (segSvgLen <= stepSvgLen + 0.01) {
    routeBuilder.points.pop();
    if (routeBuilder.points.length >= 2) {
      const p2 = routeBuilder.points[routeBuilder.points.length - 1];
      const p1 = routeBuilder.points[routeBuilder.points.length - 2];
      const ddx = p2.x - p1.x;
      const ddy = p2.y - p1.y;
      let signDx = Math.sign(ddx);
      let signDy = Math.sign(ddy);
      if (flipped) { signDx = -signDx; signDy = -signDy; }
      routeBuilder.lastDir = { dx: signDx, dy: signDy };
    } else {
      routeBuilder.lastDir = null;
    }
  } else {
    routeBuilder.points[routeBuilder.points.length - 1] = {
      x: last.x - svgDx,
      y: last.y - svgDy,
    };
  }
  routeBuilder.totalSteps = Math.max(0, (routeBuilder.totalSteps || 1) - 1);
  renderRouteBuilder();
  updateRouteBuilderCount();
}

function updateRouteBuilderCount() {
  const el = document.getElementById('rdCount');
  if (!el || !routeBuilder) return;
  el.textContent = (routeBuilder.totalSteps || 0) + 'y';
}

function renderRouteBuilder() {
  const prevPreview = document.getElementById('routeBuilderPreview');
  if (prevPreview) prevPreview.remove();
  if (!routeBuilder || routeBuilder.points.length < 1) return;
  const p = players.find(pl => pl.id === routeBuilder.playerId);
  if (!p) return;
  const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  g.id = 'routeBuilderPreview';
  if (routeBuilder.points.length >= 2) {
    const pts = routeBuilder.points;
    let d = `M ${pts[0].x} ${pts[0].y}`;
    for (let i = 1; i < pts.length; i++) d += ` L ${pts[i].x} ${pts[i].y}`;
    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', d);
    path.setAttribute('fill', 'none');
    path.setAttribute('stroke', p.color);
    path.setAttribute('stroke-width', 0.385);
    path.setAttribute('stroke-linecap', 'round');
    path.setAttribute('stroke-linejoin', 'round');
    g.appendChild(path);
    // Arrow at end
    const last = pts[pts.length - 1];
    const prev = pts[pts.length - 2];
    const ang = Math.atan2(last.y - prev.y, last.x - prev.x);
    const size = 1.8;
    const tipX = last.x + size * Math.cos(ang);
    const tipY = last.y + size * Math.sin(ang);
    const halfW = size * 0.55;
    const x2 = last.x + halfW * Math.cos(ang + Math.PI / 2);
    const y2 = last.y + halfW * Math.sin(ang + Math.PI / 2);
    const x3 = last.x + halfW * Math.cos(ang - Math.PI / 2);
    const y3 = last.y + halfW * Math.sin(ang - Math.PI / 2);
    const arrow = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    arrow.setAttribute('d', `M ${tipX} ${tipY} L ${x2} ${y2} L ${x3} ${y3} Z`);
    arrow.setAttribute('fill', p.color);
    g.appendChild(arrow);
  }
  // Dots at waypoints
  routeBuilder.points.forEach((pt, i) => {
    if (i === 0) return;
    const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    c.setAttribute('cx', pt.x); c.setAttribute('cy', pt.y);
    c.setAttribute('r', 0.4);
    c.setAttribute('fill', p.color);
    c.setAttribute('opacity', 0.6);
    g.appendChild(c);
  });
  routesGroup.appendChild(g);
}

drawCancel.addEventListener('click', cancelDrawing);
drawCancel.addEventListener('touchend', (e) => { e.preventDefault(); cancelDrawing(); }, { passive: false });

//=========================================================================
// UNIFIED DRAG SYSTEM
// One touchstart on the field-wrap. We figure out what got hit.
// touchmove/touchend bound to document for cross-element tracking.
//=========================================================================
function getPoint(e) {
  if (e.touches && e.touches.length > 0) {
    return { x: e.touches[0].clientX, y: e.touches[0].clientY };
  }
  if (e.changedTouches && e.changedTouches.length > 0) {
    return { x: e.changedTouches[0].clientX, y: e.changedTouches[0].clientY };
  }
  return { x: e.clientX, y: e.clientY };
}

// What's at the current touch point? (uses elementFromPoint to walk through layers)
function hitTest(clientX, clientY) {
  const el = document.elementFromPoint(clientX, clientY);
  if (!el) return { type: 'none' };
  const token = el.closest('.token');
  if (token) return { type: 'token', el: token, id: parseInt(token.dataset.id) };
  if (el.closest('.los-grip')) return { type: 'los' };
  if (el.closest('.bottom-bar, .inspector, .topbar')) return { type: 'ui' };
  // Anything inside field-wrap that's not the above is empty field
  if (el.closest('.field-wrap')) return { type: 'field' };
  return { type: 'none' };
}

function startDrag(e) {
  if (e.touches && e.touches.length > 1) return;  // ignore multi-touch
  const pt = getPoint(e);
  const hit = hitTest(pt.x, pt.y);

  if (hit.type === 'ui') return; // let UI handle it

  // ----- ROUTE DRAW MODE -----
  // When pending (drawMode set with raw=null), start drawing only if the user
  // touches the targeted player (for new routes) or the route endpoint (for branches).
  if (drawMode && drawMode.raw === null) {
    const p = players.find(pl => pl.id === drawMode.ownerId);
    if (!p) {
      drawMode = null;
      drawBanner.classList.remove('show');
      return;
    }

    // Determine start point: player position (new route) or route endpoint (branch)
    let startPt;
    let shouldStart = false;
    if (drawMode.isBranch) {
      // Start from the route's last point. Allow tap anywhere within ~3y of that.
      const parentRoute = routes.find(r => r.ownerId === drawMode.ownerId);
      if (parentRoute && parentRoute.points.length > 0) {
        const lastPt = parentRoute.points[parentRoute.points.length - 1];
        const fieldPt = clientToFieldXY(pt.x, pt.y);
        const distFromEnd = Math.hypot(fieldPt.x - lastPt.x, fieldPt.y - lastPt.y);
        if (distFromEnd < 4) {  // 4 svg units ≈ 4.5y tolerance
          startPt = { x: lastPt.x, y: lastPt.y };
          shouldStart = true;
        }
      }
    } else if (hit.type === 'token' && hit.id === drawMode.ownerId) {
      startPt = { x: p.x, y: p.y };
      shouldStart = true;
    }

    if (shouldStart) {
      e.preventDefault();
      drawMode.raw = [startPt];
      livePreviewPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      livePreviewPath.setAttribute('class', 'route-path live');
      livePreviewPath.setAttribute('stroke', p.color);
      routesGroup.appendChild(livePreviewPath);
      livePreviewArrow = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      livePreviewArrow.setAttribute('class', 'route-arrow');
      livePreviewArrow.setAttribute('fill', p.color);
      livePreviewArrow.setAttribute('stroke', p.color);
      livePreviewArrow.setAttribute('stroke-width', 0.15);
      routesGroup.appendChild(livePreviewArrow);
      drag = { type: 'draw', startClient: pt, didMove: false };
      return;
    } else {
      // Tapped elsewhere → cancel draw mode
      cancelDrawing();
      // Fall through so the tap still does its normal job
    }
  }

  if (hit.type === 'token') {
    e.preventDefault();
    const p = players.find(pl => pl.id === hit.id);
    if (!p) return;
    if (p.isLosHandle) {
      // Dragging the LOS-handle player: move LOS + whole formation
      drag = {
        type: 'los',
        startClient: pt,
        startValue: losYards,
        playerSnapshot: players.map(pp => ({ id: pp.id, x: pp.x, y: pp.y })),
        didMove: false,
      };
      hit.el.classList.add('dragging');
      return;
    }
    drag = {
      type: 'token',
      id: hit.id,
      startClient: pt,
      startValue: { x: p.x, y: p.y },
      didMove: false,
    };
    hit.el.classList.add('dragging');
    fieldWrap.classList.add('show-los');
    return;
  }

  if (hit.type === 'los') {
    e.preventDefault();
    drag = {
      type: 'los',
      startClient: pt,
      startValue: losYards,
      playerSnapshot: players.map(p => ({ id: p.id, x: p.x, y: p.y })),
      didMove: false,
    };
    return;
  }

  if (hit.type === 'field') {
    // tap empty field → deselect
    if (selectedId !== null || selectedRouteId !== null) {
      selectedId = null;
      selectedRouteId = null;
      selectedSegmentIdx = null;
      selectedWaypointIdx = null;
      selectedBranchIdx = null;
      selectedSegmentIsBranch = false;
      showInspector = false;
      render();
      renderRoutes();
    }
  }
}

function moveDrag(e) {
  if (!drag) return;
  const pt = getPoint(e);
  const dx = pt.x - drag.startClient.x;
  const dy = pt.y - drag.startClient.y;
  if (Math.hypot(dx, dy) > 4) drag.didMove = true;

  e.preventDefault();

  // Convert client delta to field SVG delta. Wrap is rotated -90°:
  //   screen-x delta → svg-y delta (sideline-to-sideline, scaled by FIELD_H)
  //   screen-y delta → -svg-x delta (offense direction; up-on-screen = +svg-x)
  const rect = fieldWrap.getBoundingClientRect();
  let dxField = -(dy / rect.height) * FIELD_W;   // svg play-axis delta
  let dyField =  (dx / rect.width)  * FIELD_H;   // svg sideline delta

  if (drag.type === 'draw') {
    extendDrawing(pt.x, pt.y);
    return;
  }

  if (drag.type === 'token') {
    const p = players.find(pl => pl.id === drag.id);
    if (!p) return;
    const margin = 1.8;
    const newX = Math.max(margin, Math.min(FIELD_W - margin, drag.startValue.x + dxField));
    const newY = Math.max(margin, Math.min(FIELD_H - margin, drag.startValue.y + dyField));
    const dxFinal = newX - drag.startValue.x;
    const dyFinal = newY - drag.startValue.y;
    p.x = newX; p.y = newY;
    updateTokenPosition(p.id);
    // If the player owns a route, translate the route by the same delta
    const ownedRoute = routes.find(r => r.ownerId === p.id);
    if (ownedRoute && (dxFinal !== 0 || dyFinal !== 0)) {
      // translate from the original snapshot at start of drag
      if (!drag.routeSnapshot) {
        drag.routeSnapshot = ownedRoute.points.map(pt => ({ x: pt.x, y: pt.y }));
      }
      ownedRoute.points = drag.routeSnapshot.map(pt => ({
        x: pt.x + dxFinal,
        y: pt.y + dyFinal,
      }));
      renderRoutes();
    }
  } else if (drag.type === 'los') {
    const dyards = dxField / YARD;
    let newYards = Math.round(drag.startValue + dyards);
    newYards = Math.max(0, Math.min(70, newYards));

    // The actual LOS shift in SVG x-units
    const dxLos = (newYards - drag.startValue) * YARD;

    if (newYards !== losYards) {
      losYards = newYards;
      updateLos();
      // Move every player by the same dxLos, clamping to keep them on the field
      const margin = 1.8;
      drag.playerSnapshot.forEach(s => {
        const p = players.find(pl => pl.id === s.id);
        if (!p) return;
        p.x = Math.max(margin, Math.min(FIELD_W - margin, s.x + dxLos));
        updateTokenPosition(p.id);
      });
      // Translate all routes by the same dxLos (snapshot once)
      if (!drag.routesSnapshot) {
        drag.routesSnapshot = routes.map(r => ({
          id: r.id,
          points: r.points.map(pt => ({ x: pt.x, y: pt.y })),
        }));
      }
      drag.routesSnapshot.forEach(rs => {
        const r = routes.find(rt => rt.id === rs.id);
        if (!r) return;
        r.points = rs.points.map(pt => ({ x: pt.x + dxLos, y: pt.y })); // y unchanged
      });
      if (routes.length) renderRoutes();
    }
  }
}

function endDrag(e) {
  if (!drag) return;
  if (drag.type === 'token') {
    const el = playerLayer.querySelector(`[data-id="${drag.id}"]`);
    if (el) el.classList.remove('dragging');
    fieldWrap.classList.remove('show-los');
    if (!drag.didMove) {
      selectedId = drag.id;
      showInspector = true;
      render();
    }
  } else if (drag.type === 'los') {
    // Clear dragging class on whichever element initiated this LOS drag
    const losPlayer = players.find(p => p.isLosHandle);
    if (losPlayer) {
      const el = playerLayer.querySelector(`[data-id="${losPlayer.id}"]`);
      if (el) el.classList.remove('dragging');
    }
    if (drag.didMove) {
      showHelper("LOS at " + losYards + " yard line");
    } else if (losPlayer) {
      // Tap on the C without dragging → select it
      selectedId = losPlayer.id;
      showInspector = true;

function updateInspector() {
  const dpad = document.getElementById('dpad');
  if (selectedId === null) {
    inspector.classList.remove('open');
    dpad.classList.remove('open');
    return;
  }
  const p = players.find(pl => pl.id === selectedId);
  if (!p) {
    inspector.classList.remove('open');
    dpad.classList.remove('open');
    return;
  }
  // D-pad always shows when something is selected
  dpad.classList.add('open');
  // Inspector only shows when explicitly requested (i.e. tapped on field)
  if (!showInspector) {
    inspector.classList.remove('open');
    return;
  }
  inspector.classList.add('open');
  inspTitle.textContent = p.side === 'offense' ? 'Offensive Player' : 'Defensive Player';
  inspLabel.value = p.label || '';
  [...colorGrid.children].forEach(s => {
    s.classList.toggle('selected', s.dataset.color.toLowerCase() === p.color.toLowerCase());
  });
  // Route button label depends on whether this player has a route
  const hasRoute = routes.some(r => r.ownerId === p.id);
  if (hasRoute) {
    routeBtn.textContent = 'Delete Route';
    routeBtn.classList.add('has-route');
  } else {
    routeBtn.textContent = 'Draw Route';
    routeBtn.classList.remove('has-route');
  }
}
function buildColorGrid() {
  COLORS.forEach(c => {
    const sw = document.createElement('div');
    sw.className = 'color-swatch';
    sw.style.background = c;
    sw.dataset.color = c;
    const apply = (e) => {
      e.preventDefault();
      e.stopPropagation();
      if (selectedId === null) return;
      const p = players.find(pl => pl.id === selectedId);
      if (!p) return;
      p.color = c;
      render();
    };
    sw.addEventListener('click', apply);
    sw.addEventListener('touchend', apply, { passive: false });
    colorGrid.appendChild(sw);
  });
}

// Flip DIRECTION — mirror player positions around the LOS, reverse play direction
function flipDirection() {
  const losX = losXSvg();
  players.forEach(p => {
    p.x = 2 * losX - p.x;
  });
  routes.forEach(r => {
    r.points = r.points.map(pt => ({ x: 2 * losX - pt.x, y: pt.y }));
    if (r.branches) {
      r.branches.forEach(br => {
        br.points = br.points.map(pt => ({ x: 2 * losX - pt.x, y: pt.y }));
      });
    }
  });
  flipped = !flipped;
  fieldWrap.classList.toggle('flipped', flipped);
  render();
  renderRoutes();
  updateLos();
}

// Flip PLAY — mirror player positions laterally (across field's center y-axis)
// Twins Right becomes Twins Left. Same direction of attack, mirrored alignment.
function flipPlay() {
  const centerY = FIELD_H / 2;
  players.forEach(p => {
    p.y = 2 * centerY - p.y;
  });
  routes.forEach(r => {
    r.points = r.points.map(pt => ({ x: pt.x, y: 2 * centerY - pt.y }));
    if (r.branches) {
      r.branches.forEach(br => {
        br.points = br.points.map(pt => ({ x: pt.x, y: 2 * centerY - pt.y }));
      });
    }
  });
  // Mirror cap box colors across the sideline axis: row 0 ↔ row 2 (row 1 stays)
  if (typeof capBoxFills !== 'undefined') {
    const mirrored = {};
    Object.entries(capBoxFills).forEach(([key, color]) => {
      const [row, col] = key.split(',').map(Number);
      const newRow = 2 - row;  // 0↔2, 1↔1
      mirrored[`${newRow},${col}`] = color;
    });
    Object.keys(capBoxFills).forEach(k => delete capBoxFills[k]);
    Object.entries(mirrored).forEach(([k, v]) => { capBoxFills[k] = v; });
    if (typeof updateCapBoxes === 'function') updateCapBoxes();
  }
  render();
  renderRoutes();
}

// Flip FORMATION ONLY — mirror positions but keep colors/labels anchored to field position
// So if RED was at top-wing and GREEN at bottom-wing, after this flip whoever
// is now at top-wing wears RED (and gets that label), bottom-wing wears GREEN.
function flipFormationOnly() {
  const offense = players.filter(p => p.side === 'offense');
  const defense = players.filter(p => p.side === 'defense');
  const centerY = FIELD_H / 2;

  function processSide(group) {
    if (group.length === 0) return;

    const snap = group.map(p => ({
      id: p.id,
      origX: p.x, origY: p.y,
      color: p.color, label: p.label,
    }));

    // Mirror positions
    group.forEach(p => { p.y = 2 * centerY - p.y; });
    const ids = new Set(group.map(p => p.id));
    routes.forEach(r => {
      if (!ids.has(r.ownerId)) return;
      r.points = r.points.map(pt => ({ x: pt.x, y: 2 * centerY - pt.y }));
      if (r.branches) {
        r.branches.forEach(br => {
          br.points = br.points.map(pt => ({ x: pt.x, y: 2 * centerY - pt.y }));
        });
      }
    });

    // For each snapshot S at (origX, origY) with its color/label, find the
    // CURRENT player whose new position is closest to (origX, origY) —
    // i.e. the player who is NOW at the position where S originally was.
    // That player takes S's color/label. Result: colors stay anchored to
    // field positions; players who moved here adopt the local color.
    const currentPlayers = [...group];
    const assignments = new Map();

    const triples = [];
    snap.forEach((s, si) => {
      const targetX = s.origX;
      const targetY = s.origY;  // <-- ORIGINAL position, not mirrored
      currentPlayers.forEach(cp => {
        const d = Math.hypot(cp.x - targetX, cp.y - targetY);
        triples.push({ si, pid: cp.id, d });
      });
    });
    triples.sort((a, b) => a.d - b.d);

    const usedSnaps = new Set();
    const usedPids = new Set();
    triples.forEach(t => {
      if (usedSnaps.has(t.si) || usedPids.has(t.pid)) return;
      assignments.set(t.pid, t.si);
      usedSnaps.add(t.si);
      usedPids.add(t.pid);
    });

    // Apply: each player gets the color+label of the snapshot they were paired with
    group.forEach(p => {
      const si = assignments.get(p.id);
      if (si == null) return;
      const s = snap[si];
      p.color = s.color;
      p.label = s.label;
    });
  }

  processSide(offense);
  processSide(defense);
  render();
  renderRoutes();
}

// Swap positions of two players identified by color; everyone else stays put
function swapByColor(colorA, colorB, labelA, labelB) {
  const matches = (c, target) => {
    if (!c) return false;
    return c.toLowerCase() === target.toLowerCase();
  };
  const a = players.find(p => matches(p.color, colorA));
  const b = players.find(p => matches(p.color, colorB));
  if (!a || !b) {
    showHelper(`Need both ${labelA} and ${labelB} players`);
    return;
  }
  // Swap color AND label (text inside the token). Positions stay; routes stay.
  const tColor = a.color, tLabel = a.label;
  a.color = b.color; a.label = b.label;
  b.color = tColor; b.label = tLabel;
  // Swap matching cap box colors too, so cap boxes stay coordinated with player labels
  if (typeof capBoxFills !== 'undefined') {
    Object.keys(capBoxFills).forEach(k => {
      if (matches(capBoxFills[k], colorA))      capBoxFills[k] = colorB;
      else if (matches(capBoxFills[k], colorB)) capBoxFills[k] = colorA;
    });
    if (typeof updateCapBoxes === 'function') updateCapBoxes();
  }
  render();
  renderRoutes();
}

async function loadFormationLibrary() {
  const hardcoded = FORMATION_LIBRARY.slice();
  let stored = [];
  try {
    let raw = null;
    if (typeof window.storage !== 'undefined') {
      const r = await window.storage.get(FORMATION_LIBRARY_KEY);
      raw = r && r.value;
    } else {
      raw = localStorage.getItem(FORMATION_LIBRARY_KEY);
    }
    if (raw) stored = JSON.parse(raw);
  } catch (e) { stored = []; }
  const hardcodedNames = new Set(hardcoded.map(f => f.name));
  const userFormations = stored.filter(f => !hardcodedNames.has(f.name));
  FORMATION_LIBRARY = [...hardcoded, ...userFormations];
}

async function saveFormationLibrary() {
  const data = JSON.stringify(FORMATION_LIBRARY);
  try {
    if (typeof window.storage !== 'undefined') {
      await window.storage.set(FORMATION_LIBRARY_KEY, data);
    } else {
      localStorage.setItem(FORMATION_LIBRARY_KEY, data);
    }
  } catch (e) { console.error('Formation save failed', e); }
}

function formationThumbnailSvg(formation) {
  const scale = 1.6;
  const cx = 40, cy = 40;
  let lines = `<line x1="6" y1="${cy}" x2="74" y2="${cy}" stroke="#888" stroke-width="0.4" stroke-dasharray="1.5 1.5"/>`;
  const dots = formation.players.map(p => {
    const sx = cx + p.dy * scale;
    const sy = cy - p.dx * scale;
    const r = p.isLosHandle ? 3 : 2.5;
    return `<circle cx="${sx}" cy="${sy}" r="${r}" fill="${p.color}" stroke="#000" stroke-width="0.4"/>`;
  }).join('');
  return `<svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">${lines}${dots}</svg>`;
}

function applyFormation(formation) {
  // Wipe routes (clean slate per design)
  routes = [];
  selectedRouteId = null;
  // Wipe offensive players, recreate from the formation
  players = players.filter(p => p.side !== 'offense');
  const losX = losXSvg();
  const centerY = FIELD_H / 2;
  // dx/dy in the formation are in yards. Apply direction-of-play flip for dx.
  const dirX = flipped ? -1 : 1;
  formation.players.forEach(fp => {
    addPlayer('offense',
      losX + fp.dx * YARD * dirX,
      centerY + fp.dy * YARD,
      fp.label,
      fp.color,
      fp.isLosHandle);
  });
  selectedId = null;
  showInspector = false;
  render();
  renderRoutes();
}

// Generate a small SVG thumbnail for a route. Centered, scaled to fit.
function routeThumbnailSvg(route) {
  // Use a normalized 60x60 viewBox; player at center
  const pts = [{ dx: 0, dy: 0 }, ...route.relPoints.filter((p, i) => i > 0)];
  // Bounding box of all points
  let minX = 0, maxX = 0, minY = 0, maxY = 0;
  pts.forEach(p => {
    if (p.dx < minX) minX = p.dx; if (p.dx > maxX) maxX = p.dx;
    if (p.dy < minY) minY = p.dy; if (p.dy > maxY) maxY = p.dy;
  });
  const w = Math.max(1, maxX - minX);
  const h = Math.max(1, maxY - minY);
  // Add padding
  const pad = 8;
  const scale = Math.min((60 - pad * 2) / w, (60 - pad * 2) / h);
  const cx = (minX + maxX) / 2;
  const cy = (minY + maxY) / 2;
  // Build path. Rotate -90deg so route reads bottom-to-top (matches vertical field)
  // After rotation: (dx, dy) → (dy, -dx)
  let d = '';
  pts.forEach((p, i) => {
    const sx = (p.dy - cy) * scale + 30;
    const sy = -(p.dx - cx) * scale + 30;
    d += (i === 0 ? 'M' : 'L') + ` ${sx} ${sy}`;
  });
  // Player dot at origin (which after centering is somewhere in the svg)
  const ox = (0 - cy) * scale + 30;
  const oy = -(0 - cx) * scale + 30;
  return `<svg viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
    <path d="${d}" fill="none" stroke="#ff6b35" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="${ox}" cy="${oy}" r="3.5" fill="#fff" stroke="#000" stroke-width="1"/>
  </svg>`;
}

function applyRouteToPlayer(playerId, route) {
  const p = players.find(pl => pl.id === playerId);
  if (!p) return;
  // Remove any existing route owned by this player
  routes = routes.filter(r => r.ownerId !== p.id);

  // Determine if the player is on the top half (y < center) or bottom half.
  // We want a top-half receiver's "outside" (toward sideline) to be -dy,
  // and a bottom-half receiver's outside to be +dy. So flip dy for bottom players.
  const centerY = FIELD_H / 2;
  const isBottom = p.y > centerY;
  // Determine if play is going forward (+x direction) or flipped (-x).
  // After flip, the offense moves toward -x, so we negate dx for routes.
  const dirX = flipped ? -1 : 1;
  const dirY = isBottom ? -1 : 1;

  const absPoints = [{ x: p.x, y: p.y }];
  route.relPoints.forEach((pt, i) => {
    if (i === 0) return; // skip the (0,0) origin
    absPoints.push({
      x: p.x + pt.dx * dirX,
      y: p.y + pt.dy * dirY,
    });
  });

  routes.push({
    id: nextRouteId++,
    ownerId: p.id,
    points: absPoints,
    smoothed: route.type === 'curve',
    branches: [],
  });
  renderRoutes();
}
